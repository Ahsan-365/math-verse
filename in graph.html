<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inequality Visualizer - Math Verse</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Math.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/10.0.0/math.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="flex flex-col items-center p-4 md:p-8">

    <div class="glass-panel p-8 w-full max-w-4xl fade-in-up mt-8 shadow-2xl flex flex-col">
        <h2 class="text-4xl font-extrabold mb-6 text-center"><i
                class="fas fa-greater-than-equal text-purple-500 mr-2"></i> Inequality Visualizer</h2>

        <div
            class="mb-6 bg-black/40 dark:bg-black/20 p-6 rounded-2xl border border-cyan-500/30 dark:border-gray-700">
            <label class="block text-sm font-bold opacity-80 mb-2">
                Enter inequalities (comma-separated for intersections):
            </label>
            <div class="text-xs opacity-70 mb-4 ml-1">
                Examples: <code class="bg-gray-800/50 dark:bg-gray-800 px-1 rounded">y < x^2</code>, <code
                    class="bg-gray-800/50 dark:bg-gray-800 px-1 rounded">x^2 + y^2 <= 16, y > x</code>
            </div>

            <div class="flex gap-4">
                <input type="text" id="eqInput" value="x^2 + y^2 <= 16, y > x" placeholder="e.g., y < x^2 + 5"
                    class="input-field shadow-inner flex-1 text-lg py-3" />
                <button id="plotBtn" class="btn btn-primary px-8 shadow-lg text-lg font-bold">
                    <i class="fas fa-magic mr-2"></i> Shade
                </button>
            </div>
        </div>

        <div id="messageBox" class="hidden text-center mb-4 p-3 rounded-lg font-bold"></div>

        <div
            class="relative w-full aspect-square max-w-[600px] mx-auto bg-black/30 dark:bg-gray-900 rounded-xl shadow-inner border border-cyan-500/50 dark:border-gray-700 overflow-hidden">
            <canvas id="canvas" class="w-full h-full"></canvas>
            <div id="loader"
                class="absolute inset-0 bg-black/40 dark:bg-black/50 hidden flex justify-center items-center backdrop-blur-sm z-10">
                <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500"></i>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const eqInput = document.getElementById('eqInput');
            const plotBtn = document.getElementById('plotBtn');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const messageBox = document.getElementById('messageBox');
            const loader = document.getElementById('loader');

            // Responsive sizing
            canvas.width = 600;
            canvas.height = 600;

            function showMessage(msg, type = 'error') {
                messageBox.textContent = msg;
                messageBox.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
                if (type === 'error') messageBox.classList.add('bg-red-100', 'text-red-700');
                else messageBox.classList.add('bg-green-100', 'text-green-700');
            }

            function drawAxes(w, h, scale) {
                ctx.clearRect(0, 0, w, h);

                // Draw grid
                ctx.strokeStyle = document.documentElement.classList.contains('dark') ? '#334155' : '#e2e8f0';
                ctx.lineWidth = 1;

                const originX = w / 2;
                const originY = h / 2;

                ctx.beginPath();
                for (let x = 0; x <= w; x += scale) {
                    ctx.moveTo(x, 0); ctx.lineTo(x, h);
                }
                for (let y = 0; y <= h; y += scale) {
                    ctx.moveTo(0, y); ctx.lineTo(w, y);
                }
                ctx.stroke();

                // Draw main axes
                ctx.strokeStyle = document.documentElement.classList.contains('dark') ? '#94a3b8' : '#475569';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, originY); ctx.lineTo(w, originY);
                ctx.moveTo(originX, 0); ctx.lineTo(originX, h);
                ctx.stroke();
            }

            async function plotInequalities() {
                const str = eqInput.value.trim();
                if (!str) return showMessage('Enter inequality equations.', 'error');

                messageBox.classList.add('hidden');
                loader.classList.remove('hidden');

                // Let UI render loader
                await new Promise(r => setTimeout(r, 50));

                const w = canvas.width;
                const h = canvas.height;
                const scale = 30; // 30px per unit
                const originX = w / 2;
                const originY = h / 2;

                drawAxes(w, h, scale);

                const rawEqs = str.split(',').map(e => e.trim()).filter(e => e);
                const compiledEqs = [];

                try {
                    rawEqs.forEach(eq => {
                        // Math.js expects boolean operators like ==, <=, >=, <, >
                        // e.g., 'y < x^2' is valid Math.js expression
                        let expr = eq.replace(/=/g, '==').replace(/[<>]==/g, (m) => m === '<==' ? '<=' : '>=').replace(/==>/g, '=>').replace(/==</g, '=<');
                        // Reset back the <= and >=
                        expr = eq;

                        compiledEqs.push(math.compile(expr));
                    });
                } catch (e) {
                    loader.classList.add('hidden');
                    return showMessage('Syntax error: ' + e.message, 'error');
                }

                if (compiledEqs.length === 0) {
                    loader.classList.add('hidden');
                    return;
                }

                // Shader logic using imageData
                const imgData = ctx.getImageData(0, 0, w, h);
                const data = imgData.data;

                // Color configuration (RGBA)
                const shadeR = 59, shadeG = 130, shadeB = 246, shadeA = 100; // soft blue

                // Screen bounds in math coordinates
                const minX = -originX / scale;
                const maxX = (w - originX) / scale;
                const maxY = originY / scale;
                const minY = -(h - originY) / scale;

                // Optimization: Evaluate every 2x2 block (upscaled)
                const blockSize = 2;
                for (let sy = 0; sy < h; sy += blockSize) {
                    const mathY = originY / scale - sy / scale;
                    for (let sx = 0; sx < w; sx += blockSize) {
                        const mathX = sx / scale - originX / scale;

                        let satisfyAll = true;
                        try {
                            const scope = { x: mathX, y: mathY };
                            for (let i = 0; i < compiledEqs.length; i++) {
                                if (!compiledEqs[i].evaluate(scope)) {
                                    satisfyAll = false;
                                    break;
                                }
                            }
                        } catch (e) { satisfyAll = false; }

                        if (satisfyAll) {
                            for (let dy = 0; dy < blockSize; dy++) {
                                for (let dx = 0; dx < blockSize; dx++) {
                                    const py = sy + dy;
                                    const px = sx + dx;
                                    if (py < h && px < w) {
                                        const idx = (py * w + px) * 4;
                                        // Alpha blending
                                        data[idx] = (shadeR * shadeA + data[idx] * (255 - shadeA)) / 255;
                                        data[idx + 1] = (shadeG * shadeA + data[idx + 1] * (255 - shadeA)) / 255;
                                        data[idx + 2] = (shadeB * shadeA + data[idx + 2] * (255 - shadeA)) / 255;
                                    }
                                }
                            }
                        }
                    }
                }

                ctx.putImageData(imgData, 0, 0);

                loader.classList.add('hidden');
            }

            plotBtn.addEventListener('click', plotInequalities);
            eqInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') plotInequalities(); });

            // Initial Plot
            setTimeout(plotInequalities, 100);
        });
    </script>
    <script src="ai-chat.js"></script>
</body>

</html>
