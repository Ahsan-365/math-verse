<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polynomial Equation Solver - Math Verse</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="flex flex-col items-center p-4 md:p-8">

    <div class="glass-panel p-8 w-full max-w-5xl fade-in-up mt-8 shadow-2xl flex flex-col md:flex-row gap-8">

        <div class="flex-1 flex flex-col">
            <h2 class="text-4xl font-extrabold mb-6"><i class="fas fa-square-root-variable text-blue-500 mr-2"></i>
                Equation Solver</h2>

            <div class="flex border-b border-gray-200 dark:border-gray-700 mb-6">
                <button class="tab-btn active px-4 py-2 font-bold text-blue-600 border-b-2 border-blue-600"
                    data-target="linear">Linear</button>
                <button
                    class="tab-btn px-4 py-2 font-bold text-gray-500 hover:text-blue-500 transition border-b-2 border-transparent"
                    data-target="quadratic">Quadratic</button>
                <button
                    class="tab-btn px-4 py-2 font-bold text-gray-500 hover:text-blue-500 transition border-b-2 border-transparent"
                    data-target="cubic">Cubic</button>
            </div>

            <div id="linear" class="tab-content block pb-4">
                <p class="font-bold text-lg mb-4 text-center">ax + b = 0</p>
                <div class="flex justify-center items-center gap-4 mb-6">
                    <input type="number" id="l-a" value="2" class="input-field w-24 text-center text-xl font-bold">
                    <span class="font-bold text-xl">x +</span>
                    <input type="number" id="l-b" value="-4" class="input-field w-24 text-center text-xl font-bold">
                    <span class="font-bold text-xl">= 0</span>
                </div>
            </div>

            <div id="quadratic" class="tab-content hidden pb-4">
                <p class="font-bold text-lg mb-4 text-center">ax² + bx + c = 0</p>
                <div class="flex justify-center items-center gap-2 lg:gap-4 mb-6 flex-wrap">
                    <input type="number" id="q-a" value="1" class="input-field w-20 text-center text-xl font-bold">
                    <span class="font-bold text-xl">x² +</span>
                    <input type="number" id="q-b" value="-5" class="input-field w-20 text-center text-xl font-bold">
                    <span class="font-bold text-xl">x +</span>
                    <input type="number" id="q-c" value="6" class="input-field w-20 text-center text-xl font-bold">
                    <span class="font-bold text-xl">= 0</span>
                </div>
            </div>

            <div id="cubic" class="tab-content hidden pb-4">
                <p class="font-bold text-lg mb-4 text-center">ax³ + bx² + cx + d = 0</p>
                <div class="flex justify-center items-center gap-2 mb-6 flex-wrap">
                    <input type="number" id="c-a" value="1" class="input-field w-16 text-center text-lg font-bold">
                    <span class="font-bold text-lg">x³ +</span>
                    <input type="number" id="c-b" value="-6" class="input-field w-16 text-center text-lg font-bold">
                    <span class="font-bold text-lg">x² +</span>
                    <input type="number" id="c-c" value="11" class="input-field w-16 text-center text-lg font-bold">
                    <span class="font-bold text-lg">x +</span>
                    <input type="number" id="c-d" value="-6" class="input-field w-16 text-center text-lg font-bold">
                    <span class="font-bold text-lg">= 0</span>
                </div>
            </div>

            <button id="solveBtn" class="btn btn-primary w-full py-3 shadow-lg text-lg mb-6"><i
                    class="fas fa-calculator mr-2"></i> Solve Roots</button>

            <div
                class="bg-gray-100 dark:bg-gray-800 p-6 rounded-xl border border-gray-300 dark:border-gray-600 shadow-inner min-h-[120px]">
                <h3 class="font-bold text-lg mb-2 opacity-80 border-b border-gray-300 dark:border-gray-600 pb-2">Roots:
                </h3>
                <div id="result" class="text-xl font-bold leading-relaxed text-blue-600 dark:text-blue-400 font-mono">
                </div>
            </div>
        </div>

        <div class="flex-1 min-h-[400px] flex flex-col">
            <h3 class="text-xl font-bold mb-4 opacity-80 text-center">Function Visualization</h3>
            <div id="graph"
                class="w-full h-full bg-white rounded-xl shadow-inner border border-gray-200 overflow-hidden flex-1 relative">
            </div>
        </div>

    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let currentMode = 'linear';

            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        b.classList.remove('active', 'text-blue-600', 'border-blue-600');
                        b.classList.add('text-gray-500', 'border-transparent');
                    });
                    e.target.classList.remove('text-gray-500', 'border-transparent');
                    e.target.classList.add('active', 'text-blue-600', 'border-blue-600');

                    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                    document.getElementById(e.target.dataset.target).classList.remove('hidden');

                    currentMode = e.target.dataset.target;
                    solve();
                });
            });

            function formatRoot(val) {
                if (Math.abs(val) < 1e-10) return 0;
                return parseFloat(val.toFixed(6));
            }

            function solveLinear() {
                const a = parseFloat(document.getElementById('l-a').value);
                const b = parseFloat(document.getElementById('l-b').value);
                document.getElementById('result').innerHTML = '';
                if (isNaN(a) || isNaN(b)) return null;

                let roots = [];
                if (a === 0) {
                    document.getElementById('result').innerHTML = b === 0 ? "Infinite solutions (0 = 0)" : "No solution";
                    return null;
                } else {
                    const x = -b / a;
                    roots.push(x);
                    document.getElementById('result').innerHTML = `x = ${formatRoot(x)}`;
                }
                return { roots, f: (x) => a * x + b, name: `${a}x + ${b}` };
            }

            function solveQuadratic() {
                const a = parseFloat(document.getElementById('q-a').value);
                const b = parseFloat(document.getElementById('q-b').value);
                const c = parseFloat(document.getElementById('q-c').value);
                if (isNaN(a) || isNaN(b) || isNaN(c)) return null;

                if (a === 0) {
                    document.getElementById('result').innerHTML = "Not a quadratic (a=0).";
                    return null; // Should fall back to linear technically, handle simply
                }

                const discriminant = b * b - 4 * a * c;
                let roots = [];
                let resHtml = '';
                if (discriminant > 0) {
                    const x1 = (-b + Math.sqrt(discriminant)) / (2 * a);
                    const x2 = (-b - Math.sqrt(discriminant)) / (2 * a);
                    roots.push(x1, x2);
                    resHtml = `x₁ = ${formatRoot(x1)}<br>x₂ = ${formatRoot(x2)}`;
                } else if (Math.abs(discriminant) < 1e-10) {
                    const x = -b / (2 * a);
                    roots.push(x);
                    resHtml = `x = ${formatRoot(x)} (Double root)`;
                } else {
                    const real = -b / (2 * a);
                    const imag = Math.sqrt(-discriminant) / (2 * a);
                    resHtml = `x₁ = ${formatRoot(real)} + ${formatRoot(imag)}i<br>x₂ = ${formatRoot(real)} - ${formatRoot(imag)}i`;
                }

                document.getElementById('result').innerHTML = resHtml;
                return { roots, f: (x) => a * x * x + b * x + c, name: `${a}x² + ${b}x + ${c}` };
            }

            // Math cubic solver
            function solveCubic() {
                const a = parseFloat(document.getElementById('c-a').value);
                const b = parseFloat(document.getElementById('c-b').value);
                const c = parseFloat(document.getElementById('c-c').value);
                const d = parseFloat(document.getElementById('c-d').value);
                if (isNaN(a) || isNaN(b) || isNaN(c) || isNaN(d)) return null;

                if (a === 0) {
                    document.getElementById('result').innerHTML = "Not a cubic (a=0).";
                    return null;
                }

                // Convert to depressed cubic t^3 + pt + q = 0
                const p = (3 * a * c - b * b) / (3 * a * a);
                const q = (2 * b * b * b - 9 * a * b * c + 27 * a * a * d) / (27 * a * a * a);

                const discriminant = (q / 2) ** 2 + (p / 3) ** 3;
                let roots = [];
                let resHtml = '';

                if (discriminant > 0) {
                    // One real root
                    const u = Math.cbrt(-q / 2 + Math.sqrt(discriminant));
                    const v = Math.cbrt(-q / 2 - Math.sqrt(discriminant));
                    const x1 = u + v - (b / (3 * a));
                    roots.push(x1);
                    resHtml = `x₁ = ${formatRoot(x1)}<br>(2 Complex Roots Omitted)`;
                } else if (Math.abs(discriminant) < 1e-10) {
                    // All roots real, at least two are equal.
                    const u = Math.cbrt(-q / 2);
                    const x1 = 2 * u - (b / (3 * a));
                    const x2 = -u - (b / (3 * a));
                    roots.push(x1, x2);
                    resHtml = `x₁ = ${formatRoot(x1)}<br>x₂ = ${formatRoot(x2)} (Double root)`;
                } else {
                    // Three distinct real roots
                    const r = Math.sqrt(-(Math.pow(p / 3, 3)));
                    const phi = Math.acos(-q / (2 * r));
                    const mag = 2 * Math.sqrt(-p / 3);

                    const x1 = mag * Math.cos(phi / 3) - (b / (3 * a));
                    const x2 = mag * Math.cos((phi + 2 * Math.PI) / 3) - (b / (3 * a));
                    const x3 = mag * Math.cos((phi + 4 * Math.PI) / 3) - (b / (3 * a));
                    roots.push(x1, x2, x3);
                    resHtml = `x₁ = ${formatRoot(x1)}<br>x₂ = ${formatRoot(x2)}<br>x₃ = ${formatRoot(x3)}`;
                }

                document.getElementById('result').innerHTML = resHtml;
                return { roots, f: (x) => a * x * x * x + b * x * x + c * x + d, name: `${a}x³ + ${b}x² + ${c}x + ${d}` };
            }

            function solve() {
                let data = null;
                if (currentMode === 'linear') data = solveLinear();
                else if (currentMode === 'quadratic') data = solveQuadratic();
                else if (currentMode === 'cubic') data = solveCubic();

                if (!data || !data.f) {
                    Plotly.purge(document.getElementById('graph'));
                    return;
                }

                // Plotting
                let minRoot = data.roots.length > 0 ? Math.min(...data.roots) : -5;
                let maxRoot = data.roots.length > 0 ? Math.max(...data.roots) : 5;
                let padding = Math.max(2, Math.abs(maxRoot - minRoot));

                const xRange = [minRoot - padding, maxRoot + padding];
                const pts = 300;
                let xVals = [], yVals = [];
                for (let i = 0; i < pts; i++) {
                    const x = xRange[0] + (i / (pts - 1)) * (xRange[1] - xRange[0]);
                    xVals.push(x);
                    yVals.push(data.f(x));
                }

                const trace1 = {
                    x: xVals, y: yVals, mode: 'lines', name: 'f(x)', line: { width: 3, color: '#3b82f6' }
                };

                const rootTrace = {
                    x: data.roots, y: data.roots.map(() => 0), mode: 'markers', name: 'Roots',
                    marker: { size: 10, color: '#ef4444', line: { width: 2, color: 'white' } }
                };

                const layout = {
                    margin: { t: 20, r: 20, b: 40, l: 40 },
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                    hovermode: 'closest',
                    showlegend: false,
                    xaxis: { zeroline: true, zerolinecolor: '#ef4444', zerolinewidth: 2, gridcolor: '#e2e8f0' },
                    yaxis: { zeroline: true, zerolinecolor: '#ef4444', zerolinewidth: 2, gridcolor: '#e2e8f0' }
                };

                Plotly.newPlot(document.getElementById('graph'), [trace1, rootTrace], layout, { responsive: true, displayModeBar: false });
            }

            document.getElementById('solveBtn').addEventListener('click', solve);
            document.querySelectorAll('input').forEach(i => i.addEventListener('keypress', (e) => { if (e.key === 'Enter') solve(); }));

            // Initial solve
            solve();
        });
    </script>
    <script src="ai-chat.js"></script>
</body>

</html>
