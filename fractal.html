<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Explorer - Math Verse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #fractalCanvas {
            cursor: crosshair;
            image-rendering: pixelated;
            display: block;
            width: 100%;
        }

        .frac-btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: bold;
            border: 1px solid rgba(52, 211, 153, 0.3);
            background: rgba(0, 0, 0, 0.4);
            color: #6ee7b7;
            transition: 0.2s;
            white-space: nowrap;
        }

        .frac-btn:hover {
            background: rgba(52, 211, 153, 0.2);
            border-color: #34d399;
        }

        .frac-btn.active {
            background: #059669;
            color: white;
            border-color: #34d399;
            box-shadow: 0 0 10px rgba(52, 211, 153, 0.4);
        }

        .frac-input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(52, 211, 153, 0.4);
            color: white;
            border-radius: 0.5rem;
            padding: 0.4rem 0.75rem;
            width: 100%;
            font-family: monospace;
            transition: 0.2s;
        }

        .frac-input:focus {
            border-color: #34d399;
            outline: none;
        }
    </style>
</head>

<body class="flex flex-col items-center p-4 lg:p-8 relative">
    <div class="glass-panel w-full max-w-5xl p-6 lg:p-10 flex flex-col fade-in-up mt-4 md:mt-8 gap-6 relative">
        <h2
            class="text-3xl md:text-5xl font-extrabold text-center text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-500 pb-2">
            <i class="fas fa-mandalorian text-emerald-400"></i> Fractal Explorer
        </h2>

        <!-- Controls -->
        <div
            class="bg-gray-900/50 p-4 rounded-2xl border border-emerald-500/30 shadow-lg flex flex-wrap gap-4 items-center justify-between">
            <div class="flex flex-wrap gap-2">
                <button class="frac-btn active" onclick="setFrac('mandelbrot', this)">Mandelbrot</button>
                <button class="frac-btn" onclick="setFrac('julia', this)">Julia Set</button>
                <button class="frac-btn" onclick="setFrac('burning', this)">Burning Ship</button>
                <button class="frac-btn" onclick="setFrac('sierpinski', this)">Sierpiński</button>
            </div>
            <div class="flex gap-2 items-center">
                <label class="text-xs text-gray-400">Julia c =</label>
                <input type="number" id="juliaR" class="frac-input w-20 text-xs" value="-0.7" step="0.01"
                    oninput="if(currentFrac==='julia') renderFractal()">
                <span class="text-gray-500">+</span>
                <input type="number" id="juliaI" class="frac-input w-20 text-xs" value="0.27" step="0.01"
                    oninput="if(currentFrac==='julia') renderFractal()">
                <span class="text-gray-400 font-bold">i</span>
            </div>
            <div class="flex gap-2 items-center">
                <label class="text-xs text-gray-400">Iterations</label>
                <input type="range" id="maxIter" min="20" max="400" value="100" class="w-28"
                    oninput="document.getElementById('iterVal').innerText=this.value; renderFractal()">
                <span id="iterVal" class="text-xs text-emerald-300 w-8">100</span>
            </div>
            <div class="flex gap-2">
                <button class="frac-btn" onclick="resetView()"><i class="fas fa-home"></i> Reset</button>
            </div>
        </div>

        <!-- Canvas -->
        <div
            class="bg-black rounded-2xl overflow-hidden border border-gray-700 shadow-[inset_0_0_40px_rgba(0,0,0,0.9)] relative">
            <canvas id="fractalCanvas"></canvas>
            <div id="fracInfo"
                class="absolute top-2 left-2 bg-black/60 text-xs text-emerald-300 font-mono p-2 rounded-lg">Drag to pan
                • Scroll to zoom</div>
            <div id="fracCoords"
                class="absolute bottom-2 right-2 bg-black/60 text-xs text-gray-400 font-mono p-1 rounded"></div>
        </div>

    </div>

    <script src="script.js"></script>
    <script>
        let currentFrac = 'mandelbrot';
        const canvas = document.getElementById('fractalCanvas');
        const ctx = canvas.getContext('2d');

        let viewX = -2.5, viewY = -1.75, viewW = 3.5, viewH = 3.5;
        let isDragging = false, dragSX, dragSY, dragVX, dragVY;

        function setFrac(f, btn) {
            currentFrac = f;
            document.querySelectorAll('.frac-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            resetView();
        }

        function resetView() {
            if (currentFrac === 'mandelbrot' || currentFrac === 'burning') { viewX = -2.5; viewY = -1.75; viewW = 3.5; viewH = 3.5; }
            else if (currentFrac === 'julia') { viewX = -1.75; viewY = -1.75; viewW = 3.5; viewH = 3.5; }
            else if (currentFrac === 'sierpinski') { viewX = 0; viewY = 0; viewW = 1; viewH = 1; }
            renderFractal();
        }

        function renderFractal() {
            let W = canvas.parentElement.clientWidth - 4;
            let H = Math.min(W * 0.75, window.innerHeight * 0.6, 560);
            canvas.width = W; canvas.height = H;

            if (currentFrac === 'sierpinski') { drawSierpinski(); return; }

            const maxIter = parseInt(document.getElementById('maxIter').value);
            const imgData = ctx.createImageData(W, H);
            const data = imgData.data;

            let jcr = parseFloat(document.getElementById('juliaR').value) || 0;
            let jci = parseFloat(document.getElementById('juliaI').value) || 0;

            for (let px = 0; px < W; px++) {
                for (let py = 0; py < H; py++) {
                    let x = viewX + (px / W) * viewW;
                    let y = viewY + (py / H) * viewH;
                    let iter = 0;
                    let zr = 0, zi = 0;
                    if (currentFrac === 'julia') { zr = x; zi = y; x = jcr; y = jci; }

                    while (iter < maxIter && zr * zr + zi * zi <= 4) {
                        let tmp;
                        if (currentFrac === 'burning') {
                            tmp = zr * zr - zi * zi + x;
                            zi = Math.abs(2 * zr * zi) + y;
                        } else {
                            tmp = zr * zr - zi * zi + x;
                            zi = 2 * zr * zi + y;
                        }
                        zr = tmp;
                        iter++;
                    }

                    let i4 = (py * W + px) * 4;
                    if (iter === maxIter) {
                        data[i4] = 0; data[i4 + 1] = 0; data[i4 + 2] = 0;
                    } else {
                        let smooth = iter + 1 - Math.log(Math.log2(Math.sqrt(zr * zr + zi * zi)));
                        let t = smooth / maxIter;
                        // Neon colour palette
                        let r = Math.sin(Math.PI * t * 3) * 127 + 128;
                        let g = Math.sin(Math.PI * t * 3 + Math.PI * 0.7) * 127 + 128;
                        let b = Math.sin(Math.PI * t * 3 + Math.PI * 1.4) * 127 + 128;
                        data[i4] = r; data[i4 + 1] = g; data[i4 + 2] = b;
                    }
                    data[i4 + 3] = 255;
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function drawSierpinski() {
            const W = canvas.width, H = canvas.height;
            ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, W, H);
            let depth = 7;
            function drawTri(x1, y1, x2, y2, x3, y3, d) {
                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3); ctx.closePath();
                ctx.fillStyle = `hsl(${150 + d * 30},80%,${20 + d * 8}%)`; ctx.fill();
                if (d === 0) return;
                let mx12 = (x1 + x2) / 2, my12 = (y1 + y2) / 2;
                let mx23 = (x2 + x3) / 2, my23 = (y2 + y3) / 2;
                let mx13 = (x1 + x3) / 2, my13 = (y1 + y3) / 2;
                ctx.beginPath(); ctx.moveTo(mx12, my12); ctx.lineTo(mx23, my23); ctx.lineTo(mx13, my13); ctx.closePath();
                ctx.fillStyle = '#0f172a'; ctx.fill();
                drawTri(x1, y1, mx12, my12, mx13, my13, d - 1);
                drawTri(mx12, my12, x2, y2, mx23, my23, d - 1);
                drawTri(mx13, my13, mx23, my23, x3, y3, d - 1);
            }
            let m = Math.min(W, H) - 40;
            let cx2 = W / 2, cy = H * 0.9;
            drawTri(cx2, cy - m, cx2 - m / 2, cy, cx2 + m / 2, cy, depth);
        }

        /* Zoom & Pan */
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            let bx = canvas.getBoundingClientRect();
            let mx = (e.clientX - bx.left) / canvas.width;
            let my = (e.clientY - bx.top) / canvas.height;
            let fx = viewX + mx * viewW, fy = viewY + my * viewH;
            let factor = e.deltaY > 0 ? 1.5 : 0.67;
            viewW *= factor; viewH *= factor;
            viewX = fx - mx * viewW; viewY = fy - my * viewH;
            renderFractal();
        }, { passive: false });

        canvas.addEventListener('mousedown', e => {
            isDragging = true; dragSX = e.clientX; dragSY = e.clientY;
            dragVX = viewX; dragVY = viewY;
        });
        canvas.addEventListener('mousemove', e => {
            let bx = canvas.getBoundingClientRect();
            let rx = viewX + ((e.clientX - bx.left) / canvas.width) * viewW;
            let ry = viewY + ((e.clientY - bx.top) / canvas.height) * viewH;
            document.getElementById('fracCoords').innerText = `Re: ${rx.toFixed(4)}, Im: ${ry.toFixed(4)}`;
            if (!isDragging) return;
            let dx = (e.clientX - dragSX) / canvas.width * viewW;
            let dy = (e.clientY - dragSY) / canvas.height * viewH;
            viewX = dragVX - dx; viewY = dragVY - dy;
            renderFractal();
        });
        canvas.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('mouseleave', () => isDragging = false);

        // Touch support
        let lastPinchDist = 0;
        canvas.addEventListener('touchstart', e => {
            if (e.touches.length === 1) { isDragging = true; dragSX = e.touches[0].clientX; dragSY = e.touches[0].clientY; dragVX = viewX; dragVY = viewY; }
        });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                let dx = (e.touches[0].clientX - dragSX) / canvas.width * viewW;
                let dy = (e.touches[0].clientY - dragSY) / canvas.height * viewH;
                viewX = dragVX - dx; viewY = dragVY - dy; renderFractal();
            }
        }, { passive: false });
        canvas.addEventListener('touchend', () => isDragging = false);

        resetView();
    </script>
    <script src="ai-chat.js"></script>
</body>

</html>
