<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Geometry - Math Verse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tab-btn {
            padding: .55rem 1rem;
            border-radius: 999px;
            font-weight: bold;
            transition: .3s;
            color: #cbd5e1;
            border: 1px solid transparent;
            font-size: .8rem;
        }

        .tab-btn:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .tab-btn.active {
            background: rgba(99, 102, 241, 0.25);
            color: white;
            border-color: #6366f1;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
        }

        .d-input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.4);
            color: white;
            border-radius: .5rem;
            padding: .5rem .75rem;
            width: 100%;
            font-family: monospace;
        }

        .d-input:focus {
            border-color: #818cf8;
            outline: none;
        }

        .val-card {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(99, 102, 241, 0.4);
            border-radius: .75rem;
            padding: .75rem;
            text-align: center;
        }
    </style>
</head>

<body class="flex flex-col items-center p-4 lg:p-8 relative">
    <div class="glass-panel w-full max-w-5xl p-6 lg:p-10 flex flex-col fade-in-up mt-4 md:mt-8 gap-6">
        <h2
            class="text-3xl md:text-4xl font-extrabold text-center text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-violet-500 pb-2">
            <i class="fas fa-cube text-indigo-400"></i> 3D Geometry Explorer
        </h2>
        <div class="flex flex-wrap justify-center gap-2 bg-black/40 p-2 rounded-full border border-indigo-500/30">
            <button class="tab-btn active" onclick="switchTab('shapes',this)">3D Shapes</button>
            <button class="tab-btn" onclick="switchTab('platonic',this)">Platonic Solids</button>
            <button class="tab-btn" onclick="switchTab('coords',this)">3D Coordinates</button>
            <button class="tab-btn" onclick="switchTab('crosssec',this)">Cross-Sections</button>
        </div>

        <!-- 3D Shapes Calculator -->
        <div id="tab-shapes" class="tab-content flex flex-col gap-4">
            <div class="bg-gray-900/50 p-5 rounded-2xl border border-indigo-500/30 flex flex-col gap-4">
                <h3 class="text-indigo-300 font-bold text-xl">3D Shape Calculator</h3>
                <div class="flex flex-wrap gap-2 mb-2">
                    <button class="btn text-xs bg-indigo-900 hover:bg-indigo-800"
                        onclick="setShape('sphere')">Sphere</button>
                    <button class="btn text-xs bg-indigo-900 hover:bg-indigo-800"
                        onclick="setShape('cylinder')">Cylinder</button>
                    <button class="btn text-xs bg-indigo-900 hover:bg-indigo-800"
                        onclick="setShape('cone')">Cone</button>
                    <button class="btn text-xs bg-indigo-900 hover:bg-indigo-800"
                        onclick="setShape('cube')">Cube</button>
                    <button class="btn text-xs bg-indigo-900 hover:bg-indigo-800"
                        onclick="setShape('cuboid')">Cuboid</button>
                    <button class="btn text-xs bg-indigo-900 hover:bg-indigo-800" onclick="setShape('pyramid')">Square
                        Pyramid</button>
                    <button class="btn text-xs bg-indigo-900 hover:bg-indigo-800"
                        onclick="setShape('torus')">Torus</button>
                    <button class="btn text-xs bg-indigo-900 hover:bg-indigo-800"
                        onclick="setShape('ellipsoid')">Ellipsoid</button>
                    <button class="btn text-xs bg-indigo-900 hover:bg-indigo-800" onclick="setShape('prism')">Triangular
                        Prism</button>
                </div>
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="flex flex-col gap-3 flex-1">
                        <div id="shapeInputs" class="flex flex-col gap-3"></div>
                        <button class="btn bg-indigo-700 hover:bg-indigo-600 font-bold"
                            onclick="calcShape()">Calculate</button>
                        <div class="grid grid-cols-2 gap-3" id="shapeResults"></div>
                        <div id="shapeFormulas"
                            class="bg-black/40 p-4 rounded-xl text-sm font-mono text-gray-300 leading-loose"></div>
                    </div>
                    <canvas id="shapeCanvas" class="rounded-xl bg-black border border-gray-700"
                        style="width:280px;height:280px"></canvas>
                </div>
            </div>
        </div>

        <!-- Platonic Solids -->
        <div id="tab-platonic" class="tab-content hidden flex flex-col gap-4">
            <div class="bg-gray-900/50 p-5 rounded-2xl border border-indigo-500/30 flex flex-col gap-4">
                <h3 class="text-indigo-300 font-bold text-xl">Platonic Solids</h3>
                <div class="flex flex-wrap gap-2">
                    <button class="btn text-sm bg-indigo-900 hover:bg-indigo-800"
                        onclick="showPlatonic('tetra')">Tetrahedron</button>
                    <button class="btn text-sm bg-indigo-900 hover:bg-indigo-800" onclick="showPlatonic('cube')">Cube
                        (Hexahedron)</button>
                    <button class="btn text-sm bg-indigo-900 hover:bg-indigo-800"
                        onclick="showPlatonic('octa')">Octahedron</button>
                    <button class="btn text-sm bg-indigo-900 hover:bg-indigo-800"
                        onclick="showPlatonic('dodeca')">Dodecahedron</button>
                    <button class="btn text-sm bg-indigo-900 hover:bg-indigo-800"
                        onclick="showPlatonic('icosa')">Icosahedron</button>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="platonicProps"></div>
                <div class="flex flex-col md:flex-row gap-4">
                    <canvas id="platonicCanvas" class="rounded-xl bg-black border border-gray-700"
                        style="width:320px;height:320px"></canvas>
                    <div id="platonicFormulas"
                        class="bg-black/40 p-4 rounded-xl text-sm font-mono text-gray-300 leading-loose flex-1"></div>
                </div>
            </div>
        </div>

        <!-- 3D Coordinates -->
        <div id="tab-coords" class="tab-content hidden flex flex-col gap-4">
            <div class="bg-gray-900/50 p-5 rounded-2xl border border-indigo-500/30 flex flex-col gap-4">
                <h3 class="text-indigo-300 font-bold text-xl">3D Coordinate Systems & Transformations</h3>
                <div class="grid grid-cols-3 gap-3">
                    <div><label class="text-xs text-gray-400">x (Cartesian)</label><input type="number" id="c3x"
                            class="d-input" value="1" step="any" oninput="runCoords()"></div>
                    <div><label class="text-xs text-gray-400">y</label><input type="number" id="c3y" class="d-input"
                            value="1" step="any" oninput="runCoords()"></div>
                    <div><label class="text-xs text-gray-400">z</label><input type="number" id="c3z" class="d-input"
                            value="1" step="any" oninput="runCoords()"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-black/40 p-4 rounded-xl">
                        <h4 class="text-indigo-300 font-bold mb-2 text-sm">Cylindrical (r, φ, z)</h4>
                        <div id="cylCoords" class="font-mono text-gray-300 text-sm leading-loose"></div>
                    </div>
                    <div class="bg-black/40 p-4 rounded-xl">
                        <h4 class="text-indigo-300 font-bold mb-2 text-sm">Spherical (ρ, θ, φ)</h4>
                        <div id="sphCoords" class="font-mono text-gray-300 text-sm leading-loose"></div>
                    </div>
                    <div class="bg-black/40 p-4 rounded-xl">
                        <h4 class="text-indigo-300 font-bold mb-2 text-sm">Properties</h4>
                        <div id="coordProps" class="font-mono text-gray-300 text-sm leading-loose"></div>
                    </div>
                </div>
                <div class="bg-black/40 p-4 rounded-xl">
                    <h4 class="text-indigo-300 font-bold mb-2 text-sm">3D Point Distance & Midpoint</h4>
                    <div class="grid grid-cols-3 gap-2 mb-2">
                        <div><label class="text-xs text-gray-400">P₂ x</label><input type="number" id="p2x"
                                class="d-input" value="3" step="any" oninput="runCoords()"></div>
                        <div><label class="text-xs text-gray-400">P₂ y</label><input type="number" id="p2y"
                                class="d-input" value="2" step="any" oninput="runCoords()"></div>
                        <div><label class="text-xs text-gray-400">P₂ z</label><input type="number" id="p2z"
                                class="d-input" value="4" step="any" oninput="runCoords()"></div>
                    </div>
                    <div id="distResult" class="font-mono text-gray-300 text-sm"></div>
                </div>
            </div>
        </div>

        <!-- Cross Sections -->
        <div id="tab-crosssec" class="tab-content hidden flex flex-col gap-4">
            <div class="bg-gray-900/50 p-5 rounded-2xl border border-indigo-500/30 flex flex-col gap-4">
                <h3 class="text-indigo-300 font-bold text-xl">Conic Sections & Cross-Sections</h3>
                <div class="flex flex-wrap gap-2">
                    <button class="btn text-xs bg-indigo-900 hover:bg-indigo-800"
                        onclick="drawConic('circle')">Circle</button>
                    <button class="btn text-xs bg-indigo-900 hover:bg-indigo-800"
                        onclick="drawConic('ellipse')">Ellipse</button>
                    <button class="btn text-xs bg-indigo-900 hover:bg-indigo-800"
                        onclick="drawConic('parabola')">Parabola</button>
                    <button class="btn text-xs bg-indigo-900 hover:bg-indigo-800"
                        onclick="drawConic('hyperbola')">Hyperbola</button>
                </div>
                <div class="flex flex-col md:flex-row gap-4">
                    <canvas id="conicCanvas" class="rounded-xl bg-black border border-gray-700"
                        style="width:320px;height:280px"></canvas>
                    <div id="conicInfo"
                        class="bg-black/40 p-4 rounded-xl text-sm font-mono text-indigo-200 leading-loose flex-1"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        function switchTab(id, btn) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden')); document.getElementById('tab-' + id).classList.remove('hidden'); if (id === 'platonic') setTimeout(() => { const c = document.getElementById('platonicCanvas'); c.width = 320; c.height = 320; showPlatonic('cube'); }, 50); if (id === 'crosssec') setTimeout(() => { const c = document.getElementById('conicCanvas'); c.width = 320; c.height = 280; drawConic('ellipse'); }, 50); if (id === 'coords') runCoords(); }
        function f4(v) { return isFinite(v) ? parseFloat(v.toFixed(4)).toString() : '—'; }

        /* ---- 3D SHAPES ---- */
        let currentShape = 'sphere';
        const shapeData = {
            sphere: {
                label: 'Sphere', params: [{ id: 'r', label: 'Radius r' }],
                calc: (p) => { let { r } = p; let V = 4 / 3 * Math.PI * r ** 3, SA = 4 * Math.PI * r ** 2; return { Volume: V, SA, Circumference: 2 * Math.PI * r }; },
                formulas: 'V = (4/3)πr³\nSA = 4πr²\nMajor axis = 2r'
            },
            cylinder: {
                label: 'Cylinder', params: [{ id: 'r', label: 'Radius r' }, { id: 'h', label: 'Height h' }],
                calc: (p) => { let { r, h } = p; let V = Math.PI * r ** 2 * h, SA = 2 * Math.PI * r * (r + h); return { Volume: V, SA, 'Lateral SA': 2 * Math.PI * r * h, 'Base Area': Math.PI * r ** 2 }; },
                formulas: 'V = πr²h\nSA = 2πr(r+h)\nLateral = 2πrh'
            },
            cone: {
                label: 'Cone', params: [{ id: 'r', label: 'Radius r' }, { id: 'h', label: 'Height h' }],
                calc: (p) => { let { r, h } = p; let l = Math.sqrt(r ** 2 + h ** 2), V = Math.PI * r ** 2 * h / 3, SA = Math.PI * r * (r + l); return { Volume: V, SA, 'Slant height l': l, 'Lateral SA': Math.PI * r * l }; },
                formulas: 'V = (1/3)πr²h\nSA = πr(r+l)\nl = √(r²+h²)'
            },
            cube: {
                label: 'Cube', params: [{ id: 'a', label: 'Side length a' }],
                calc: (p) => { let { a } = p; return { Volume: a ** 3, SA: 6 * a ** 2, 'Face diagonal': a * Math.sqrt(2), 'Space diagonal': a * Math.sqrt(3) }; },
                formulas: 'V = a³\nSA = 6a²\nFace diag = a√2\nSpace diag = a√3'
            },
            cuboid: {
                label: 'Cuboid', params: [{ id: 'a', label: 'Length a' }, { id: 'b', label: 'Width b' }, { id: 'c2', label: 'Height c' }],
                calc: (p) => { let { a, b, c2 } = p; let V = a * b * c2, SA = 2 * (a * b + b * c2 + a * c2); return { Volume: V, SA, 'Space diagonal': Math.sqrt(a ** 2 + b ** 2 + c2 ** 2) }; },
                formulas: 'V = abc\nSA = 2(ab+bc+ac)\nDiag = √(a²+b²+c²)'
            },
            pyramid: {
                label: 'Square Pyramid', params: [{ id: 'a', label: 'Base side a' }, { id: 'h', label: 'Height h' }],
                calc: (p) => { let { a, h } = p; let l = Math.sqrt((a / 2) ** 2 + h ** 2), V = a ** 2 * h / 3, SA = a ** 2 + 2 * a * l; return { Volume: V, SA, 'Slant height l': l, 'Lateral face area': a * l / 2 * 4 }; },
                formulas: 'V = (1/3)a²h\nSA = a² + 2al\nl = √((a/2)²+h²)'
            },
            torus: {
                label: 'Torus', params: [{ id: 'R2', label: 'Major radius R' }, { id: 'r', label: 'Tube radius r' }],
                calc: (p) => { let { R2, r } = p; let V = 2 * Math.PI ** 2 * R2 * r ** 2, SA = 4 * Math.PI ** 2 * R2 * r; return { Volume: V, SA }; },
                formulas: 'V = 2π²Rr²\nSA = 4π²Rr'
            },
            ellipsoid: {
                label: 'Ellipsoid', params: [{ id: 'a', label: 'a (x-axis)' }, { id: 'b', label: 'b (y-axis)' }, { id: 'c2', label: 'c (z-axis)' }],
                calc: (p) => { let { a, b, c2 } = p; let p2 = ((a * b) ** 1.6075 + (a * c2) ** 1.6075 + (b * c2) ** 1.6075) / 3; let SA = 4 * Math.PI * (p2) ** (1 / 1.6075); let V = 4 / 3 * Math.PI * a * b * c2; return { Volume: V, 'SA (Knud Thomsen approx)': SA }; },
                formulas: 'V = (4/3)πabc\nSA ≈ 4π((aᵖbᵖ+aᵖcᵖ+bᵖcᵖ)/3)^(1/p)\np ≈ 1.6075'
            },
            prism: {
                label: 'Triangular Prism', params: [{ id: 'a', label: 'Base a' }, { id: 'b', label: 'Base b' }, { id: 'c2', label: 'Base c' }, { id: 'h', label: 'Height/Length h' }],
                calc: (p) => { let { a, b, c2, h } = p; let s = (a + b + c2) / 2, A = Math.sqrt(s * (s - a) * (s - b) * (s - c2)); return { Volume: A * h, SA: 2 * A + (a + b + c2) * h, 'Base area': A }; },
                formulas: 'V = A_base × h\nA = √(s(s-a)(s-b)(s-c))\nSA = 2A + Ph'
            },
        };

        function setShape(s) {
            currentShape = s; let data = shapeData[s];
            document.getElementById('shapeInputs').innerHTML = data.params.map((p, i) => `<div><label class="text-xs text-gray-400">${p.label}</label><input type="number" id="si_${p.id}" class="d-input" value="${[5, 3, 2, 4][i] || 5}" step="any" oninput="calcShape()"></div>`).join('');
            calcShape(); drawShapePreview(s);
        }

        function calcShape() {
            let data = shapeData[currentShape]; if (!data) return;
            let params = {}; data.params.forEach(p => { let el = document.getElementById('si_' + p.id); if (el) params[p.id] = parseFloat(el.value) || 0; });
            try {
                let res = data.calc(params);
                document.getElementById('shapeResults').innerHTML = Object.entries(res).map(([k, v]) => `<div class="val-card"><span class="text-xs text-gray-500 block">${k}</span><span class="text-lg font-mono text-indigo-300 font-bold">${f4(v)}</span></div>`).join('');
                document.getElementById('shapeFormulas').innerText = data.formulas;
            } catch (e) { document.getElementById('shapeResults').innerHTML = '<div class="text-red-400 text-sm">Invalid parameters</div>'; }
        }

        function drawShapePreview(s) {
            const c = document.getElementById('shapeCanvas'); c.width = 280; c.height = 280;
            const cx = c.getContext('2d'), W = 280, H = 280, cx2 = 140, cy2 = 140;
            cx.fillStyle = '#050818'; cx.fillRect(0, 0, W, H);
            cx.strokeStyle = '#6366f1'; cx.lineWidth = 2; cx.fillStyle = 'rgba(99,102,241,0.15)';
            if (s === 'sphere') { cx.beginPath(); cx.arc(cx2, cy2, 90, 0, Math.PI * 2); cx.fill(); cx.stroke(); cx.beginPath(); cx.ellipse(cx2, cy2, 90, 25, 0, 0, Math.PI * 2); cx.strokeStyle = 'rgba(99,102,241,0.3)'; cx.stroke(); }
            else if (s === 'cylinder') { cx.beginPath(); cx.rect(cx2 - 55, cy2 - 80, 110, 160); cx.fill(); cx.stroke(); cx.beginPath(); cx.ellipse(cx2, cy2 - 80, 55, 18, 0, 0, Math.PI * 2); cx.stroke(); cx.beginPath(); cx.ellipse(cx2, cy2 + 80, 55, 18, 0, 0, Math.PI * 2); cx.fill(); cx.stroke(); }
            else if (s === 'cone') { cx.beginPath(); cx.moveTo(cx2, cy2 - 90); cx.lineTo(cx2 - 75, cy2 + 85); cx.lineTo(cx2 + 75, cy2 + 85); cx.closePath(); cx.fill(); cx.stroke(); cx.beginPath(); cx.ellipse(cx2, cy2 + 85, 75, 22, 0, 0, Math.PI * 2); cx.fill(); cx.stroke(); }
            else if (s === 'cube') {
                let pts = [[cx2 - 60, cy2], [cx2, cy2 - 60], [cx2 + 60, cy2], [cx2, cy2 + 60]];// isometric cube
                cx.beginPath(); cx.moveTo(cx2 - 70, cy2); cx.lineTo(cx2, cy2 - 45); cx.lineTo(cx2 + 70, cy2); cx.lineTo(cx2 + 70, cy2 + 80); cx.lineTo(cx2, cy2 + 80 + 45); cx.lineTo(cx2 - 70, cy2 + 80); cx.closePath(); cx.fill(); cx.stroke();
                cx.beginPath(); cx.moveTo(cx2, cy2 - 45); cx.lineTo(cx2, cy2 - 45 + 80); cx.lineTo(cx2 + 70, cy2 + 80); cx.moveTo(cx2, cy2 - 45 + 80); cx.lineTo(cx2 - 70, cy2 + 80); cx.stroke();
            }
            else { cx.beginPath(); cx.arc(cx2, cy2, 80, 0, Math.PI * 2); cx.fill(); cx.stroke(); cx.fillStyle = '#818cf8'; cx.font = '14px monospace'; cx.textAlign = 'center'; cx.fillText(s, cx2, cy2); }
        }

        /* ---- PLATONIC SOLIDS ---- */
        const platonics = {
            tetra: {
                name: 'Tetrahedron', faces: 4, vertices: 4, edges: 6, face: 'Equilateral Triangle', angle: '70.53°', dual: 'Tetrahedron',
                formulas: (a) => `V = a³√2/12 = ${f4(a ** 3 * Math.sqrt(2) / 12)}\nSA = a²√3 = ${f4(a ** 2 * Math.sqrt(3))}\nMid-radius = a/(2√6) = ${f4(a / (2 * Math.sqrt(6)))}`
            },
            cube: {
                name: 'Cube (Hexahedron)', faces: 6, vertices: 8, edges: 12, face: 'Square', angle: '90°', dual: 'Octahedron',
                formulas: (a) => `V = a³ = ${f4(a ** 3)}\nSA = 6a² = ${f4(6 * a ** 2)}\nDiagonal = a√3 = ${f4(a * Math.sqrt(3))}`
            },
            octa: {
                name: 'Octahedron', faces: 8, vertices: 6, edges: 12, face: 'Equilateral Triangle', angle: '109.47°', dual: 'Cube',
                formulas: (a) => `V = a³√2/3 = ${f4(a ** 3 * Math.sqrt(2) / 3)}\nSA = 2a²√3 = ${f4(2 * a ** 2 * Math.sqrt(3))}`
            },
            dodeca: {
                name: 'Dodecahedron', faces: 12, vertices: 20, edges: 30, face: 'Regular Pentagon', angle: '116.57°', dual: 'Icosahedron',
                formulas: (a) => { let φ = (1 + Math.sqrt(5)) / 2; return `V = a³(15+7√5)/4 = ${f4(a ** 3 * (15 + 7 * Math.sqrt(5)) / 4)}\nSA = 3a²√(25+10√5) = ${f4(3 * a ** 2 * Math.sqrt(25 + 10 * Math.sqrt(5)))}`; }
            },
            icosa: {
                name: 'Icosahedron', faces: 20, vertices: 12, edges: 30, face: 'Equilateral Triangle', angle: '138.19°', dual: 'Dodecahedron',
                formulas: (a) => { let φ = (1 + Math.sqrt(5)) / 2; return `V = 5a³φ²/6 = ${f4(5 * a ** 3 * φ ** 2 / 6)}\nSA = 5a²√3 = ${f4(5 * a ** 2 * Math.sqrt(3))}`; }
            },
        };

        function showPlatonic(name) {
            let p = platonics[name];
            document.getElementById('platonicProps').innerHTML = [
                ['Solid', p.name], ['Faces', p.faces], ['Vertices', p.vertices], ['Edges (E)', p.edges], ['F-V+E', p.faces - p.vertices + p.edges], ['Face Shape', p.face], ['Dihedral Angle', p.angle], ['Dual', p.dual]
            ].map(([k, v]) => `<div class="val-card"><span class="text-xs text-gray-500 block">${k}</span><span class="font-mono text-indigo-300 font-bold">${v}</span></div>`).join('');
            document.getElementById('platonicFormulas').innerText = `Euler's Formula: F - V + E = ${p.faces} - ${p.vertices} + ${p.edges} = ${p.faces - p.vertices + p.edges}\n\n${typeof p.formulas === 'function' ? p.formulas(5) : '—'}`;
            drawPlatonicCanvas(name);
        }

        function drawPlatonicCanvas(name) {
            const c = document.getElementById('platonicCanvas'); const cx = c.getContext('2d'), W = 320, H = 320;
            cx.fillStyle = '#050818'; cx.fillRect(0, 0, W, H);
            const cx2 = W / 2, cy2 = H / 2; cx.strokeStyle = '#6366f1'; cx.lineWidth = 1.5; cx.fillStyle = 'rgba(99,102,241,0.1)';
            let labels = { 'tetra': '4 equilateral\ntriangular faces', 'cube': '6 square faces', 'octa': '8 equilateral\ntriangular faces', 'dodeca': '12 pentagonal faces', 'icosa': '20 equilateral\ntriangular faces' };
            // Simple 2D projections
            let pts = [];
            if (name === 'cube') {
                let r = 80;[[cx2 - r, cy2 - r], [cx2 + r, cy2 - r], [cx2 + r, cy2 + r], [cx2 - r, cy2 + r]].forEach((p, i) => { pts.push(p); let o = [cx2 - r + 30, cy2 - r + 30, cx2 + r + 30, cy2 - r + 30, cx2 + r + 30, cy2 + r + 30, cx2 - r + 30, cy2 + r + 30]; });
                let front = [[cx2 - 80, cy2 - 80], [cx2 + 80, cy2 - 80], [cx2 + 80, cy2 + 80], [cx2 - 80, cy2 + 80]];
                let back = front.map(([x, y]) => [x + 40, y - 40]);
                [front, back].forEach(p => { cx.beginPath(); cx.moveTo(p[0][0], p[0][1]); p.forEach(p2 => cx.lineTo(p2[0], p2[1])); cx.closePath(); cx.fill(); cx.stroke(); });
                for (let i = 0; i < 4; i++) { cx.beginPath(); cx.moveTo(front[i][0], front[i][1]); cx.lineTo(back[i][0], back[i][1]); cx.stroke(); }
            } else {
                let n = { 'tetra': 4, 'octa': 6, 'icosa': 12, 'dodeca': 20 }[name] || 6;
                let pts2 = Array.from({ length: n }, (_, i) => [cx2 + 90 * Math.cos(2 * Math.PI * i / n), cy2 + 90 * Math.sin(2 * Math.PI * i / n)]);
                cx.beginPath(); pts2.forEach(([x, y], i) => i === 0 ? cx.moveTo(x, y) : cx.lineTo(x, y)); cx.closePath(); cx.fill(); cx.stroke();
                for (let i = 0; i < pts2.length; i++) for (let j = i + 1; j < pts2.length; j++) { if (Math.hypot(pts2[i][0] - pts2[j][0], pts2[i][1] - pts2[j][1]) < 120) { cx.beginPath(); cx.moveTo(pts2[i][0], pts2[i][1]); cx.lineTo(pts2[j][0], pts2[j][1]); cx.strokeStyle = 'rgba(99,102,241,0.5)'; cx.stroke(); } }
            }
            cx.fillStyle = '#818cf8'; cx.font = '11px monospace'; cx.textAlign = 'center'; cx.fillText(labels[name], cx2, H - 20); cx.textAlign = 'start';
        }

        /* ---- COORDINATES ---- */
        function runCoords() {
            let x = parseFloat(document.getElementById('c3x').value) || 0, y = parseFloat(document.getElementById('c3y').value) || 0, z = parseFloat(document.getElementById('c3z').value) || 0;
            let r = Math.hypot(x, y), rho = Math.hypot(x, y, z), phi = Math.atan2(y, x) * 180 / Math.PI, theta = Math.acos(z / rho) * 180 / Math.PI;
            document.getElementById('cylCoords').innerHTML = `r = ${f4(r)}<br>φ = ${f4(phi)}°<br>z = ${f4(z)}`;
            document.getElementById('sphCoords').innerHTML = `ρ = ${f4(rho)}<br>θ = ${f4(theta)}° (polar)<br>φ = ${f4(phi)}° (azimuth)`;
            document.getElementById('coordProps').innerHTML = `|P| = ${f4(rho)}<br>Unit vector: (${f4(x / rho)},${f4(y / rho)},${f4(z / rho)})<br>Octant: ${x >= 0 ? '+' + 'x' : '-x'} ${y >= 0 ? '+' + 'y' : '-y'} ${z >= 0 ? '+' + 'z' : '-z'}`;
            let x2 = parseFloat(document.getElementById('p2x').value) || 0, y2 = parseFloat(document.getElementById('p2y').value) || 0, z2 = parseFloat(document.getElementById('p2z').value) || 0;
            let dist = Math.hypot(x2 - x, y2 - y, z2 - z);
            let mx = (x + x2) / 2, my = (y + y2) / 2, mz = (z + z2) / 2;
            document.getElementById('distResult').innerHTML = `|P₁P₂| = ${f4(dist)}<br>Midpoint M = (${f4(mx)}, ${f4(my)}, ${f4(mz)})`;
        }

        /* ---- CONICS ---- */
        function drawConic(type) {
            const c = document.getElementById('conicCanvas'); c.width = 320; c.height = 280;
            const cx = c.getContext('2d'), W = 320, H = 280, cx2 = W / 2, cy2 = H / 2;
            cx.fillStyle = '#050818'; cx.fillRect(0, 0, W, H);
            cx.strokeStyle = '#334155'; cx.lineWidth = 1; cx.beginPath(); cx.moveTo(cx2, 20); cx.lineTo(cx2, H - 20); cx.stroke(); cx.beginPath(); cx.moveTo(20, cy2); cx.lineTo(W - 20, cy2); cx.stroke();
            cx.strokeStyle = '#6366f1'; cx.lineWidth = 2.5;
            let info = '';
            if (type === 'circle') { cx.beginPath(); cx.arc(cx2, cy2, 80, 0, Math.PI * 2); cx.stroke(); info = 'x² + y² = r²\nr = 80 units\nEccentricity e = 0\nArea = πr² = 20106\nCircumference = 2πr = 503'; }
            else if (type === 'ellipse') { cx.beginPath(); cx.ellipse(cx2, cy2, 110, 70, 0, 0, Math.PI * 2); cx.stroke(); let a2 = 110, b2 = 70, c3 = Math.sqrt(a2 ** 2 - b2 ** 2); info = `x²/a² + y²/b² = 1\na=110, b=70, c=${f4(c3)}\nEccentricity e = ${f4(c3 / a2)}\nFoci at (±${f4(c3)}, 0)\nArea = πab = ${f4(Math.PI * a2 * b2)}`; }
            else if (type === 'parabola') { cx.beginPath(); cx.moveTo(20, 20); for (let x = -130; x <= 130; x += 2) { let y = x * x / 150; cx.lineTo(cx2 + x, cy2 + 90 - y); } cx.stroke(); info = 'y = x²/(4p)\np = focus distance = 37.5\nFocus at (0, p) = (0, 37.5)\nDirectrix: y = -p\nEccentricity e = 1'; }
            else if (type === 'hyperbola') { cx.beginPath(); let a3 = 80, b3 = 60; let f2 = true; for (let x = a3; x <= 200; x += 1) { let y = b3 * Math.sqrt(x ** 2 / a3 ** 2 - 1); if (f2) { cx.moveTo(cx2 + x, cy2 + y); f2 = false; } else { cx.lineTo(cx2 + x, cy2 + y); } } cx.moveTo(cx2 - a3, cy2 + b3 * Math.sqrt(-1) || 0); f2 = true; for (let x = a3; x <= 200; x += 1) { let y = -b3 * Math.sqrt(x ** 2 / a3 ** 2 - 1); if (f2) { cx.moveTo(cx2 + x, cy2 + y); f2 = false; } else cx.lineTo(cx2 + x, cy2 + y); } cx.moveTo(cx2 + a3, cy2); f2 = true; for (let x = a3; x <= 200; x += 1) { let y = b3 * Math.sqrt(x ** 2 / a3 ** 2 - 1); if (f2) { cx.moveTo(cx2 - x, cy2 + y); f2 = false; } else cx.lineTo(cx2 - x, cy2 + y); } f2 = true; for (let x = a3; x <= 200; x += 1) { let y = -b3 * Math.sqrt(x ** 2 / a3 ** 2 - 1); if (f2) { cx.moveTo(cx2 - x, cy2 + y); f2 = false; } else cx.lineTo(cx2 - x, cy2 + y); } cx.stroke(); let c4 = Math.sqrt(a3 ** 2 + b3 ** 2); info = `x²/a² - y²/b² = 1\na=${a3}, b=${b3}, c=${f4(c4)}\nEccentricity e = ${f4(c4 / a3)}\nFoci at (±${f4(c4)}, 0)\nAsymptotes: y = ±(b/a)x = ±${f4(b3 / a3)}x`; }
            document.getElementById('conicInfo').innerHTML = info.replace(/\n/g, '<br>');
        }

        setShape('sphere'); showPlatonic('cube');
        setTimeout(() => { const c = document.getElementById('shapeCanvas'); c.width = 280; c.height = 280; drawShapePreview('sphere'); }, 100);
    </script>
