<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Engine - Math Verse</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tab-btn {
            padding: 0.75rem 1.5rem;
            font-weight: bold;
            border-radius: 999px;
            transition: all 0.3s;
            color: #cbd5e1;
            border: 1px solid transparent;
        }

        .tab-btn:hover {
            background: rgba(56, 189, 248, 0.1);
            color: #7dd3fc;
        }

        .tab-btn.active {
            background: rgba(56, 189, 248, 0.25);
            color: white;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
            border-color: #38bdf8;
        }

        .calc-body {
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.9), rgba(31, 41, 55, 0.95));
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 1.5rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            max-width: 480px;
            width: 100%;
        }

        .calc-screen {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 1rem;
            padding: 1rem;
            text-align: right;
            position: relative;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.6);
            margin-bottom: 1rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .screen-top {
            min-height: 1.5rem;
            font-size: 0.8rem;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
        }

        .screen-mid {
            min-height: 2rem;
            font-size: 1.25rem;
            color: #cbd5e1;
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .screen-bot {
            min-height: 3rem;
            font-size: 2.5rem;
            font-weight: 800;
            color: #38bdf8;
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
        }

        .cbtn {
            background: #1e293b;
            border: 1px solid #334155;
            color: #f8fafc;
            border-radius: 0.5rem;
            padding: 0.75rem 0;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .cbtn:active {
            transform: scale(0.95);
        }

        .cbtn:hover {
            background: #334155;
        }

        .cbtn-func {
            background: #0f172a;
            color: #7dd3fc;
            border-color: #1e293b;
            font-size: 0.9rem;
        }

        .cbtn-func:hover {
            background: #1e293b;
        }

        .cbtn-mem {
            background: rgba(245, 158, 11, 0.1);
            color: #fcd34d;
            border-color: rgba(245, 158, 11, 0.3);
            font-size: 0.9rem;
        }

        .cbtn-mem:hover {
            background: rgba(245, 158, 11, 0.2);
        }

        .cbtn-action {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.3);
        }

        .cbtn-action:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .cbtn-eq {
            background: #0284c7;
            color: white;
            border-color: #0369a1;
            grid-column: span 2;
        }

        .cbtn-eq:hover {
            background: #0369a1;
        }

        .cbtn-rpn-ent {
            background: #059669;
            color: white;
            border-color: #047857;
            grid-column: span 2;
        }

        .rpn-stack-view {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 0.5rem;
            padding: 0.5rem;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column-reverse;
            gap: 0.25rem;
            font-family: monospace;
            color: #38bdf8;
            text-align: right;
            font-size: 1.1rem;
            min-height: 120px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .rpn-stack-item {
            border-bottom: 1px dashed #334155;
            padding-bottom: 0.25rem;
        }

        .rpn-stack-item:last-child {
            border-bottom: none;
        }

        .rpn-stack-item span.idx {
            float: left;
            color: #64748b;
            font-size: 0.8rem;
            padding-top: 0.2rem;
        }

        .shift-active {
            background: #38bdf8 !important;
            color: #0f172a !important;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
    </style>
</head>

<body class="flex flex-col items-center p-4 lg:p-8 relative">
    <div class="glass-panel w-full max-w-5xl p-6 lg:p-10 flex flex-col fade-in-up mt-4 md:mt-8 gap-6 relative">
        <h2
            class="text-3xl md:text-5xl font-extrabold text-center text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-blue-500 pb-2">
            <i class="fas fa-calculator text-sky-400"></i> Scientific Engine
        </h2>

        <!-- Tabs -->
        <div
            class="flex flex-wrap justify-center gap-4 bg-black/40 p-2 rounded-full border border-sky-500/30 mx-auto w-full max-w-2xl mb-4">
            <button class="tab-btn active" onclick="switchTab('alg')">Algebraic Mode (ALG)</button>
            <button class="tab-btn" onclick="switchTab('rpn')">Reverse Polish Notation (RPN)</button>
        </div>

        <div class="flex flex-col lg:flex-row gap-8 justify-center items-start w-full">

            <!-- Standard Algebraic Calculator -->
            <div id="tab-alg" class="tab-content calc-body mx-auto">
                <div class="calc-screen">
                    <div class="screen-top">
                        <span id="algModeIndicator">DEG</span>
                        <span id="algMemIndicator" class="text-amber-400 hidden">M</span>
                    </div>
                    <div class="screen-mid" id="algInput"></div>
                    <div class="screen-bot" id="algOutput">0</div>
                </div>

                <div class="btn-grid">
                    <!-- Row 1: Memory & Modes -->
                    <button class="cbtn cbtn-func" id="algShiftBtn" onclick="algHandle('SHIFT')">SHIFT</button>
                    <button class="cbtn cbtn-mem" onclick="algHandle('MC')">MC</button>
                    <button class="cbtn cbtn-mem" onclick="algHandle('MR')">MR</button>
                    <button class="cbtn cbtn-mem" onclick="algHandle('M+')">M+</button>
                    <button class="cbtn cbtn-mem" onclick="algHandle('M-')">M-</button>

                    <!-- Row 2: Secondary Funcs -->
                    <button class="cbtn cbtn-func shift-target" data-prim="x²" data-sec="x³"
                        onclick="algHandleFunc(this)">x²</button>
                    <button class="cbtn cbtn-func shift-target" data-prim="√" data-sec="³√"
                        onclick="algHandleFunc(this)">√</button>
                    <button class="cbtn cbtn-func shift-target" data-prim="x^y" data-sec="y√x"
                        onclick="algHandleFunc(this)">x^y</button>
                    <button class="cbtn cbtn-func shift-target" data-prim="e^x" data-sec="10^x"
                        onclick="algHandleFunc(this)">e^x</button>
                    <button class="cbtn cbtn-func shift-target" data-prim="ln" data-sec="log"
                        onclick="algHandleFunc(this)">ln</button>

                    <!-- Row 3: Trig -->
                    <button class="cbtn cbtn-func shift-target" data-prim="sin" data-sec="asin"
                        onclick="algHandleFunc(this)">sin</button>
                    <button class="cbtn cbtn-func shift-target" data-prim="cos" data-sec="acos"
                        onclick="algHandleFunc(this)">cos</button>
                    <button class="cbtn cbtn-func shift-target" data-prim="tan" data-sec="atan"
                        onclick="algHandleFunc(this)">tan</button>
                    <button class="cbtn cbtn-func" onclick="algHandle('(')">(</button>
                    <button class="cbtn cbtn-func" onclick="algHandle(')')">)</button>

                    <!-- Row 4: Math controls -->
                    <button class="cbtn cbtn-func shift-target" data-prim="π" data-sec="e"
                        onclick="algHandleFunc(this)">π</button>
                    <button class="cbtn cbtn-func shift-target" data-prim="1/x" data-sec="x!"
                        onclick="algHandleFunc(this)">1/x</button>
                    <button class="cbtn cbtn-func" onclick="algHandle('DEG/RAD')">D/R</button>
                    <button class="cbtn cbtn-action" onclick="algHandle('DEL')">DEL</button>
                    <button class="cbtn cbtn-action" onclick="algHandle('AC')">AC</button>

                    <!-- NUM PAD -->
                    <button class="cbtn" onclick="algHandle('7')">7</button>
                    <button class="cbtn" onclick="algHandle('8')">8</button>
                    <button class="cbtn" onclick="algHandle('9')">9</button>
                    <button class="cbtn cbtn-func text-xl" onclick="algHandle('÷')">÷</button>
                    <button class="cbtn cbtn-func" onclick="algHandle('%')">%</button>

                    <button class="cbtn" onclick="algHandle('4')">4</button>
                    <button class="cbtn" onclick="algHandle('5')">5</button>
                    <button class="cbtn" onclick="algHandle('6')">6</button>
                    <button class="cbtn cbtn-func text-xl" onclick="algHandle('×')">×</button>
                    <button class="cbtn cbtn-func" onclick="algHandle('ANS')">ANS</button>

                    <button class="cbtn" onclick="algHandle('1')">1</button>
                    <button class="cbtn" onclick="algHandle('2')">2</button>
                    <button class="cbtn" onclick="algHandle('3')">3</button>
                    <button class="cbtn cbtn-func text-xl" onclick="algHandle('-')">−</button>
                    <button class="cbtn" onclick="algHandle('+/-')">+/-</button>

                    <button class="cbtn" onclick="algHandle('0')">0</button>
                    <button class="cbtn" onclick="algHandle('.')">.</button>
                    <button class="cbtn cbtn-eq text-2xl" onclick="algHandle('=')">=</button>
                    <button class="cbtn cbtn-func text-xl" onclick="algHandle('+')">+</button>
                </div>
            </div>

            <!-- RPN Calculator -->
            <div id="tab-rpn" class="tab-content hidden calc-body mx-auto">
                <div class="rpn-stack-view" id="rpnStackView">
                    <!-- Stack rows go here -->
                </div>

                <div class="calc-screen !mb-4">
                    <div class="screen-top">
                        <span id="rpnModeIndicator">DEG</span>
                        <span id="rpnMemIndicator" class="text-amber-400 hidden">M</span>
                    </div>
                    <div class="screen-bot" id="rpnInput">0</div>
                </div>

                <div class="btn-grid pb-2">
                    <button class="cbtn cbtn-func" id="rpnShiftBtn" onclick="rpnHandle('SHIFT')">SHIFT</button>
                    <button class="cbtn cbtn-mem" onclick="rpnHandle('MC')">MC</button>
                    <button class="cbtn cbtn-mem" onclick="rpnHandle('MR')">MR</button>
                    <button class="cbtn cbtn-mem" onclick="rpnHandle('M+')">M+</button>
                    <button class="cbtn cbtn-mem" onclick="rpnHandle('M-')">M-</button>

                    <button class="cbtn cbtn-func shift-target-rpn" data-prim="x²" data-sec="x³"
                        onclick="rpnHandleFunc(this)">x²</button>
                    <button class="cbtn cbtn-func shift-target-rpn" data-prim="√" data-sec="³√"
                        onclick="rpnHandleFunc(this)">√</button>
                    <button class="cbtn cbtn-func shift-target-rpn" data-prim="y^x" data-sec="x√y"
                        onclick="rpnHandleFunc(this)">y^x</button>
                    <button class="cbtn cbtn-func shift-target-rpn" data-prim="e^x" data-sec="10^x"
                        onclick="rpnHandleFunc(this)">e^x</button>
                    <button class="cbtn cbtn-func shift-target-rpn" data-prim="ln" data-sec="log"
                        onclick="rpnHandleFunc(this)">ln</button>

                    <button class="cbtn cbtn-func shift-target-rpn" data-prim="sin" data-sec="asin"
                        onclick="rpnHandleFunc(this)">sin</button>
                    <button class="cbtn cbtn-func shift-target-rpn" data-prim="cos" data-sec="acos"
                        onclick="rpnHandleFunc(this)">cos</button>
                    <button class="cbtn cbtn-func shift-target-rpn" data-prim="tan" data-sec="atan"
                        onclick="rpnHandleFunc(this)">tan</button>
                    <button class="cbtn cbtn-func shift-target-rpn" data-prim="π" data-sec="e"
                        onclick="rpnHandleFunc(this)">π</button>
                    <button class="cbtn cbtn-func shift-target-rpn" data-prim="1/x" data-sec="x!"
                        onclick="rpnHandleFunc(this)">1/x</button>

                    <button class="cbtn cbtn-func" onclick="rpnHandle('SWAP')">x↔y</button>
                    <button class="cbtn cbtn-func" onclick="rpnHandle('DROP')">DROP</button>
                    <button class="cbtn cbtn-func" onclick="rpnHandle('DEG/RAD')">D/R</button>
                    <button class="cbtn cbtn-action" onclick="rpnHandle('DEL')">DEL</button>
                    <button class="cbtn cbtn-action" onclick="rpnHandle('AC')">AC</button>

                    <button class="cbtn" onclick="rpnHandle('7')">7</button>
                    <button class="cbtn" onclick="rpnHandle('8')">8</button>
                    <button class="cbtn" onclick="rpnHandle('9')">9</button>
                    <button class="cbtn cbtn-func text-xl" onclick="rpnHandle('÷')">÷</button>
                    <button class="cbtn cbtn-func" onclick="rpnHandle('%')">%</button>

                    <button class="cbtn" onclick="rpnHandle('4')">4</button>
                    <button class="cbtn" onclick="rpnHandle('5')">5</button>
                    <button class="cbtn" onclick="rpnHandle('6')">6</button>
                    <button class="cbtn cbtn-func text-xl" onclick="rpnHandle('×')">×</button>
                    <button class="cbtn" onclick="rpnHandle('+/-')">+/-</button>

                    <button class="cbtn" onclick="rpnHandle('1')">1</button>
                    <button class="cbtn" onclick="rpnHandle('2')">2</button>
                    <button class="cbtn" onclick="rpnHandle('3')">3</button>
                    <button class="cbtn cbtn-func text-xl" onclick="rpnHandle('-')">−</button>
                    <button class="cbtn cbtn-rpn-ent row-span-2" onclick="rpnHandle('ENTER')">ENTER</button>

                    <button class="cbtn col-span-2" onclick="rpnHandle('0')">0</button>
                    <button class="cbtn" onclick="rpnHandle('.')">.</button>
                    <button class="cbtn cbtn-func text-xl" onclick="rpnHandle('+')">+</button>
                </div>
            </div>

            <div class="hidden lg:flex flex-col gap-4 text-sm text-gray-400 w-64 pt-4">
                <div class="bg-gray-900/50 p-4 rounded-xl border border-gray-700">
                    <h4 class="font-bold text-sky-400 mb-2">Memory Registers</h4>
                    <p class="mb-1"><span class="text-amber-400 font-bold">M+</span> Adds to mem</p>
                    <p class="mb-1"><span class="text-amber-400 font-bold">M-</span> Subtracts from mem</p>
                    <p class="mb-1"><span class="text-amber-400 font-bold">MR</span> Recalls mem</p>
                    <p><span class="text-amber-400 font-bold">MC</span> Clears mem</p>
                </div>
                <div class="bg-gray-900/50 p-4 rounded-xl border border-gray-700">
                    <h4 class="font-bold text-sky-400 mb-2">RPN Mode Tips</h4>
                    <p class="mb-1">Operations apply immediately to the stack (Y and X registers).</p>
                    <p class="mb-1"><span class="text-white font-bold">ENTER</span> pushes X to stack.</p>
                    <p><span class="text-white font-bold">x↔y</span> swaps bottom two stack items.</p>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function switchTab(id) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
        }

        // Shared Math Memory & Config
        let GLOBAL_MEM = 0;
        let isDeg = true;

        const updateMemDisplay = () => {
            document.getElementById('algMemIndicator').classList.toggle('hidden', GLOBAL_MEM === 0);
            document.getElementById('rpnMemIndicator').classList.toggle('hidden', GLOBAL_MEM === 0);
        };

        const updateModeDisplay = () => {
            document.getElementById('algModeIndicator').innerText = isDeg ? 'DEG' : 'RAD';
            document.getElementById('rpnModeIndicator').innerText = isDeg ? 'DEG' : 'RAD';
        };

        const fact = (n) => {
            if (n < 0 || !Number.isInteger(n)) return NaN;
            if (n === 0) return 1;
            let r = 1; for (let i = 2; i <= n; i++) r *= i; return r;
        };

        const d2r = (d) => d * (Math.PI / 180);
        const r2d = (r) => r * (180 / Math.PI);

        const trig = (fn, val) => {
            if (fn === 'sin') return isDeg ? Math.sin(d2r(val)) : Math.sin(val);
            if (fn === 'cos') return isDeg ? Math.cos(d2r(val)) : Math.cos(val);
            if (fn === 'tan') return isDeg ? Math.tan(d2r(val)) : Math.tan(val);
            if (fn === 'asin') return isDeg ? r2d(Math.asin(val)) : Math.asin(val);
            if (fn === 'acos') return isDeg ? r2d(Math.acos(val)) : Math.acos(val);
            if (fn === 'atan') return isDeg ? r2d(Math.atan(val)) : Math.atan(val);
        };

        /* -------------------------------------------------------------------------- */
        /* ALG MODE                                                                   */
        /* -------------------------------------------------------------------------- */
        let algExp = '';
        let algOut = '0';
        let algShift = false;
        let algAns = 0;
        let algNewInput = true;

        const drawAlg = () => {
            document.getElementById('algInput').innerText = algExp;

            // Format output nicely for massive/tiny numbers
            let dOut = algOut;
            if (!isNaN(parseFloat(algOut)) && isFinite(parseFloat(algOut))) {
                const n = parseFloat(algOut);
                if (Math.abs(n) > 1e12 || (Math.abs(n) < 1e-10 && n !== 0)) dOut = n.toExponential(6);
                else dOut = n.toString();
            }
            document.getElementById('algOutput').innerText = dOut;
        };

        function algHandleFunc(btn) {
            let func = algShift ? btn.dataset.sec : btn.dataset.prim;
            algHandle(func);
        }

        function algHandle(v) {
            let numV = parseFloat(algOut);

            if (v === 'SHIFT') {
                algShift = !algShift;
                document.getElementById('algShiftBtn').classList.toggle('shift-active', algShift);
                document.querySelectorAll('.shift-target').forEach(b => {
                    b.innerText = algShift ? b.dataset.sec : b.dataset.prim;
                });
                return;
            }
            if (v === 'DEG/RAD') { isDeg = !isDeg; updateModeDisplay(); return; }
            if (v === 'AC') { algExp = ''; algOut = '0'; algNewInput = true; drawAlg(); return; }
            if (v === 'DEL') {
                if (!algNewInput && algOut !== '0' && algOut !== 'Error') {
                    algOut = algOut.slice(0, -1);
                    if (algOut === '' || algOut === '-') algOut = '0';
                }
                drawAlg(); return;
            }

            // Memory
            if (v === 'MC') { GLOBAL_MEM = 0; updateMemDisplay(); return; }
            if (v === 'MR') { algOut = GLOBAL_MEM.toString(); algNewInput = false; drawAlg(); return; }
            if (v === 'M+') { GLOBAL_MEM += isNaN(numV) ? 0 : numV; updateMemDisplay(); algNewInput = true; return; }
            if (v === 'M-') { GLOBAL_MEM -= isNaN(numV) ? 0 : numV; updateMemDisplay(); algNewInput = true; return; }

            // Basic Input
            if (/^[0-9]$/.test(v) || v === '.') {
                if (algNewInput || algOut === '0') {
                    algOut = v === '.' ? '0.' : v;
                    algNewInput = false;
                } else {
                    if (v === '.' && algOut.includes('.')) return;
                    algOut += v;
                }
                drawAlg(); return;
            }

            if (v === '+/-') {
                if (algOut !== '0') {
                    algOut = algOut.startsWith('-') ? algOut.substring(1) : '-' + algOut;
                    drawAlg();
                }
                return;
            }

            if (v === 'π') { algOut = Math.PI.toString(); algNewInput = true; drawAlg(); return; }
            if (v === 'e') { algOut = Math.E.toString(); algNewInput = true; drawAlg(); return; }
            if (v === 'ANS') { algOut = algAns.toString(); algNewInput = true; drawAlg(); return; }

            // Math Operations & Evaluation (Standard parsing via JS Function block)
            if (['+', '-', '×', '÷', 'x^y'].includes(v)) {
                let op = v === '×' ? '*' : v === '÷' ? '/' : v === 'x^y' ? '**' : v;
                algExp += algOut + op;
                algNewInput = true;
                drawAlg(); return;
            }

            if (v === '=') {
                algExp += algOut;
                try {
                    let calcStr = algExp.replace(/×/g, '*').replace(/÷/g, '/').replace(/\*\*/g, '**');
                    let r = Function(`"use strict"; return (${calcStr});`)();
                    if (!isFinite(r) || isNaN(r)) throw "Math Error";
                    algOut = r.toString();
                    algAns = r;
                } catch (e) {
                    algOut = "Error";
                }
                algExp = '';
                algNewInput = true;
                drawAlg(); return;
            }

            // Immediate unary functions
            if (!isNaN(numV)) {
                let r = numV;
                try {
                    if (v === 'x²') r = numV * numV;
                    if (v === 'x³') r = numV * numV * numV;
                    if (v === '√') { if (numV < 0) throw "Err"; r = Math.sqrt(numV); }
                    if (v === '³√') r = Math.cbrt(numV);
                    if (v === '1/x') { if (numV === 0) throw "Err"; r = 1 / numV; }
                    if (v === 'x!') r = fact(numV);
                    if (v === 'ln') { if (numV <= 0) throw "Err"; r = Math.log(numV); }
                    if (v === 'log') { if (numV <= 0) throw "Err"; r = Math.log10(numV); }
                    if (v === 'e^x') r = Math.exp(numV);
                    if (v === '10^x') r = Math.pow(10, numV);
                    if (['sin', 'cos', 'tan', 'asin', 'acos', 'atan'].includes(v)) r = trig(v, numV);
                    if (v === '%') r = numV / 100;

                    algOut = r.toString();
                } catch (e) {
                    algOut = 'Error';
                }
                algNewInput = true;
                drawAlg();
            }
        }


        /* -------------------------------------------------------------------------- */
        /* RPN MODE                                                                   */
        /* -------------------------------------------------------------------------- */
        let rpnStack = [];
        let rpnInput = '0';
        let rpnNewInput = true;
        let rpnShift = false;

        const drawRpn = () => {
            let dOut = rpnInput;
            if (dOut !== 'Error' && !isNaN(parseFloat(rpnInput)) && isFinite(parseFloat(rpnInput))) {
                const n = parseFloat(rpnInput);
                if (Math.abs(n) > 1e12 || (Math.abs(n) < 1e-10 && n !== 0)) dOut = n.toExponential(6);
                else dOut = rpnInput; // allow trailing decimals during input
            }
            document.getElementById('rpnInput').innerText = dOut;

            const sv = document.getElementById('rpnStackView');
            sv.innerHTML = '';
            // Show up to 4 elements of the stack
            for (let i = 0; i < 4; i++) {
                let div = document.createElement('div');
                div.className = 'rpn-stack-item';
                let val = rpnStack[rpnStack.length - 1 - i];

                let dispVal = '---';
                if (val !== undefined) {
                    if (Math.abs(val) > 1e12 || (Math.abs(val) < 1e-10 && val !== 0)) dispVal = val.toExponential(6);
                    else dispVal = val.toString();
                }

                div.innerHTML = `<span class="idx">${i + 1}:</span> ${dispVal}`;
                sv.appendChild(div);
            }
        };

        function rpnPush(val) {
            rpnStack.push(val);
        }
        function rpnPop() {
            return rpnStack.length > 0 ? rpnStack.pop() : 0;
        }

        function rpnHandleFunc(btn) {
            let func = rpnShift ? btn.dataset.sec : btn.dataset.prim;
            rpnHandle(func);
        }

        function rpnHandle(v) {
            let numV = parseFloat(rpnInput);

            if (v === 'SHIFT') {
                rpnShift = !rpnShift;
                document.getElementById('rpnShiftBtn').classList.toggle('shift-active', rpnShift);
                document.querySelectorAll('.shift-target-rpn').forEach(b => {
                    b.innerText = rpnShift ? b.dataset.sec : b.dataset.prim;
                });
                return;
            }
            if (v === 'DEG/RAD') { isDeg = !isDeg; updateModeDisplay(); return; }

            if (v === 'AC') { rpnStack = []; rpnInput = '0'; rpnNewInput = true; drawRpn(); return; }
            if (v === 'DEL') {
                if (!rpnNewInput && rpnInput !== '0' && rpnInput !== 'Error') {
                    rpnInput = rpnInput.slice(0, -1);
                    if (rpnInput === '' || rpnInput === '-') rpnInput = '0';
                } else if (rpnNewInput) {
                    rpnInput = rpnStack.length > 0 ? rpnPop().toString() : '0';
                }
                drawRpn(); return;
            }
            if (v === 'DROP') {
                if (rpnStack.length > 0) rpnStack.pop();
                drawRpn(); return;
            }

            // Memory
            if (v === 'MC') { GLOBAL_MEM = 0; updateMemDisplay(); return; }
            if (v === 'MR') { rpnInput = GLOBAL_MEM.toString(); rpnNewInput = false; drawRpn(); return; }
            if (v === 'M+') { GLOBAL_MEM += isNaN(numV) ? 0 : numV; updateMemDisplay(); rpnNewInput = true; return; }
            if (v === 'M-') { GLOBAL_MEM -= isNaN(numV) ? 0 : numV; updateMemDisplay(); rpnNewInput = true; return; }

            // Basic Input
            if (/^[0-9]$/.test(v) || v === '.') {
                if (rpnNewInput || rpnInput === '0') {
                    if (rpnNewInput && rpnInput !== '0' && rpnInput !== 'Error' && !isNaN(numV)) {
                        rpnPush(numV); // auto-push previous result when typing new number
                    }
                    rpnInput = v === '.' ? '0.' : v;
                    rpnNewInput = false;
                } else {
                    if (v === '.' && rpnInput.includes('.')) return;
                    rpnInput += v;
                }
                drawRpn(); return;
            }

            if (v === '+/-') {
                if (rpnInput !== '0') { rpnInput = rpnInput.startsWith('-') ? rpnInput.substring(1) : '-' + rpnInput; }
                drawRpn(); return;
            }
            if (v === 'π') { if (!rpnNewInput) rpnPush(numV); rpnInput = Math.PI.toString(); rpnNewInput = true; drawRpn(); return; }
            if (v === 'e') { if (!rpnNewInput) rpnPush(numV); rpnInput = Math.E.toString(); rpnNewInput = true; drawRpn(); return; }

            if (v === 'ENTER') {
                if (!isNaN(numV)) rpnPush(numV);
                rpnNewInput = true;
                drawRpn(); return;
            }
            if (v === 'SWAP') {
                if (!isNaN(numV) && rpnStack.length > 0) {
                    let y = rpnPop();
                    rpnPush(numV);
                    rpnInput = y.toString();
                    rpnNewInput = true;
                }
                drawRpn(); return;
            }

            // Binary Operations (y op x)
            if (['+', '-', '×', '÷', 'y^x', 'x√y'].includes(v)) {
                if (isNaN(numV)) return;
                let x = numV;
                let y = rpnStack.length > 0 ? rpnPop() : 0;

                try {
                    let r = 0;
                    if (v === '+') r = y + x;
                    if (v === '-') r = y - x;
                    if (v === '×') r = y * x;
                    if (v === '÷') { if (x === 0) throw "Err"; r = y / x; }
                    if (v === 'y^x') r = Math.pow(y, x);
                    if (v === 'x√y') { if (x === 0) throw "Err"; r = Math.pow(y, 1 / x); }

                    if (!isFinite(r) || isNaN(r)) throw "Math Error";
                    rpnInput = r.toString();
                } catch (e) {
                    rpnInput = "Error";
                }
                rpnNewInput = true;
                drawRpn(); return;
            }

            // Unary Operations
            if (!isNaN(numV)) {
                let r = numV;
                try {
                    if (v === 'x²') r = numV * numV;
                    if (v === 'x³') r = numV * numV * numV;
                    if (v === '√') { if (numV < 0) throw "Err"; r = Math.sqrt(numV); }
                    if (v === '³√') r = Math.cbrt(numV);
                    if (v === '1/x') { if (numV === 0) throw "Err"; r = 1 / numV; }
                    if (v === 'x!') r = fact(numV);
                    if (v === 'ln') { if (numV <= 0) throw "Err"; r = Math.log(numV); }
                    if (v === 'log') { if (numV <= 0) throw "Err"; r = Math.log10(numV); }
                    if (v === 'e^x') r = Math.exp(numV);
                    if (v === '10^x') r = Math.pow(10, numV);
                    if (['sin', 'cos', 'tan', 'asin', 'acos', 'atan'].includes(v)) r = trig(v, numV);
                    if (v === '%') r = numV / 100;

                    if (!isFinite(r) || isNaN(r)) throw "Math Error";
                    rpnInput = r.toString();
                } catch (e) {
                    rpnInput = 'Error';
                }
                rpnNewInput = true;
                drawRpn();
            }
        }

        // Init
        drawAlg();
        drawRpn();
    </script>
    <script src="ai-chat.js"></script>
</body>
