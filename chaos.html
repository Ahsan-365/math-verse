<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos Theory - Math Verse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        .tab-btn {
            padding: 0.5rem 1.25rem;
            border-radius: 999px;
            font-weight: bold;
            transition: 0.3s;
            color: #cbd5e1;
            border: 1px solid transparent;
        }

        .tab-btn:hover {
            background: rgba(248, 113, 113, 0.1);
        }

        .tab-btn.active {
            background: rgba(248, 113, 113, 0.25);
            color: white;
            border-color: #f87171;
            box-shadow: 0 0 12px rgba(248, 113, 113, 0.4);
        }

        .c-input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(248, 113, 113, 0.4);
            color: white;
            border-radius: 0.5rem;
            padding: 0.4rem 0.75rem;
            width: 100%;
            font-family: monospace;
            transition: 0.2s;
        }

        .c-input:focus {
            border-color: #f87171;
            outline: none;
        }
    </style>
</head>

<body class="flex flex-col items-center p-4 lg:p-8 relative">
    <div class="glass-panel w-full max-w-5xl p-6 lg:p-10 flex flex-col fade-in-up mt-4 md:mt-8 gap-6 relative">
        <h2
            class="text-3xl md:text-5xl font-extrabold text-center text-transparent bg-clip-text bg-gradient-to-r from-rose-400 to-red-500 pb-2">
            <i class="fas fa-infinity text-rose-400"></i> Chaos Theory Engine
        </h2>

        <div class="flex flex-wrap justify-center gap-2 bg-black/40 p-2 rounded-full border border-rose-500/30">
            <button class="tab-btn active" onclick="switchTab('lorenz', this)">Lorenz Attractor</button>
            <button class="tab-btn" onclick="switchTab('logistic', this)">Logistic Map</button>
            <button class="tab-btn" onclick="switchTab('double', this)">Double Pendulum</button>
        </div>

        <!-- Lorenz -->
        <div id="tab-lorenz" class="tab-content">
            <div class="flex flex-col gap-4">
                <div class="bg-gray-900/50 p-4 rounded-2xl border border-rose-500/30 flex flex-wrap gap-4">
                    <div class="flex gap-4 flex-wrap">
                        <div><label class="text-xs text-gray-400">σ (sigma)</label><input type="number" id="lSigma"
                                class="c-input w-24" value="10" step="0.5" oninput="runLorenz()"></div>
                        <div><label class="text-xs text-gray-400">ρ (rho)</label><input type="number" id="lRho"
                                class="c-input w-24" value="28" step="0.5" oninput="runLorenz()"></div>
                        <div><label class="text-xs text-gray-400">β (beta)</label><input type="number" id="lBeta"
                                class="c-input w-24" value="2.667" step="0.1" oninput="runLorenz()"></div>
                        <div><label class="text-xs text-gray-400">Steps</label><input type="number" id="lSteps"
                                class="c-input w-24" value="8000" step="1000" oninput="runLorenz()"></div>
                    </div>
                    <p class="text-xs text-gray-500 self-center italic">dx/dt = σ(y−x) · dy/dt = x(ρ−z)−y · dz/dt =
                        xy−βz</p>
                </div>
                <div class="bg-black/70 rounded-2xl border border-gray-700 overflow-hidden" style="height:480px">
                    <div id="lorenzPlot" style="width:100%;height:100%"></div>
                </div>
            </div>
        </div>

        <!-- Logistic Map -->
        <div id="tab-logistic" class="tab-content hidden">
            <div class="flex flex-col gap-4">
                <div class="bg-gray-900/50 p-4 rounded-2xl border border-rose-500/30 flex flex-wrap gap-4 items-center">
                    <div>
                        <label class="text-xs text-gray-400">r — Growth Rate (1 to 4)</label>
                        <div class="flex items-center gap-2 mt-1">
                            <input type="range" id="logR" min="1" max="4" step="0.001" value="3.7" class="w-48"
                                oninput="runLogistic()">
                            <span id="logRVal" class="text-rose-300 font-mono font-bold">3.700</span>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 self-center">xₙ₊₁ = r · xₙ · (1 − xₙ) <br>Bifurcation diagram shows
                        route to chaos.</p>
                </div>
                <div class="bg-black/70 rounded-2xl border border-gray-700 p-3">
                    <canvas id="logisticCanvas" class="w-full rounded-xl" style="height: 420px;"></canvas>
                </div>
            </div>
        </div>

        <!-- Double Pendulum -->
        <div id="tab-double" class="tab-content hidden">
            <div class="flex flex-col lg:flex-row gap-4">
                <div class="bg-gray-900/50 p-4 rounded-2xl border border-rose-500/30 flex flex-col gap-4 flex-1">
                    <h3 class="text-rose-300 font-bold">Parameters</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-xs text-gray-400">L₁ (m)</label><input type="number" id="dpL1"
                                class="c-input" value="1" step="0.1" oninput="resetDP()"></div>
                        <div><label class="text-xs text-gray-400">L₂ (m)</label><input type="number" id="dpL2"
                                class="c-input" value="1" step="0.1" oninput="resetDP()"></div>
                        <div><label class="text-xs text-gray-400">m₁ (kg)</label><input type="number" id="dpM1"
                                class="c-input" value="1" step="0.1" oninput="resetDP()"></div>
                        <div><label class="text-xs text-gray-400">m₂ (kg)</label><input type="number" id="dpM2"
                                class="c-input" value="1" step="0.1" oninput="resetDP()"></div>
                        <div><label class="text-xs text-gray-400">θ₁ (°)</label><input type="number" id="dpT1"
                                class="c-input" value="90" oninput="resetDP()"></div>
                        <div><label class="text-xs text-gray-400">θ₂ (°)</label><input type="number" id="dpT2"
                                class="c-input" value="45" oninput="resetDP()"></div>
                    </div>
                    <button class="btn bg-rose-600 hover:bg-rose-500 font-bold" onclick="resetDP()"><i
                            class="fas fa-play mr-2"></i>Run Simulation</button>
                    <p class="text-xs text-gray-500">A classic example of chaotic behaviour — highly sensitive to
                        initial conditions.</p>
                </div>
                <div class="bg-black/70 rounded-2xl border border-gray-700 overflow-hidden flex-1">
                    <canvas id="dpCanvas" class="w-full rounded-xl" style="height:380px"></canvas>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
    <script>
        function switchTab(id, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            if (id === 'lorenz') runLorenz();
            if (id === 'logistic') runLogistic();
            if (id === 'double') resetDP();
        }

        /* ---- LORENZ ATTRACTOR ---- */
        function runLorenz() {
            let sigma = parseFloat(document.getElementById('lSigma').value) || 10;
            let rho = parseFloat(document.getElementById('lRho').value) || 28;
            let beta = parseFloat(document.getElementById('lBeta').value) || 2.667;
            let steps = parseInt(document.getElementById('lSteps').value) || 8000;
            let dt = 0.005;

            let x = 0.1, y = 0, z = 0;
            let xs = [], ys = [], zs = [];

            for (let i = 0; i < steps; i++) {
                let dx = sigma * (y - x);
                let dy = x * (rho - z) - y;
                let dz = x * y - beta * z;
                x += dx * dt; y += dy * dt; z += dz * dt;
                xs.push(x); ys.push(y); zs.push(z);
            }

            // Colour by z-value for depth
            let minZ = Math.min(...zs), maxZ = Math.max(...zs);
            let colours = zs.map(z2 => {
                let t = (z2 - minZ) / (maxZ - minZ);
                return `hsl(${t * 280 + 20},100%,60%)`;
            });

            Plotly.newPlot('lorenzPlot', [{
                type: 'scatter3d',
                mode: 'lines',
                x: xs, y: ys, z: zs,
                line: { color: colours, width: 1 },
                opacity: 0.8
            }], {
                margin: { l: 0, r: 0, b: 0, t: 0 },
                paper_bgcolor: 'rgba(0,0,0,0)',
                scene: {
                    xaxis: { title: 'X', gridcolor: '#1e293b', zerolinecolor: '#334155' },
                    yaxis: { title: 'Y', gridcolor: '#1e293b', zerolinecolor: '#334155' },
                    zaxis: { title: 'Z', gridcolor: '#1e293b', zerolinecolor: '#334155' }
                }
            }, { displayModeBar: false, responsive: true });
        }

        /* ---- LOGISTIC MAP ---- */
        function runLogistic() {
            let r = parseFloat(document.getElementById('logR').value) || 3.7;
            document.getElementById('logRVal').innerText = r.toFixed(3);

            const canvas = document.getElementById('logisticCanvas');
            canvas.width = canvas.offsetWidth;
            canvas.height = 420;
            const cx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const padL = 35, padB = 30, padT = 15, padR = 10;
            cx.fillStyle = '#0f172a'; cx.fillRect(0, 0, W, H);

            // Build bifurcation diagram
            let rMin = 2.4, rMax = 4.0;
            let steps = W - padL - padR;

            cx.strokeStyle = '#334155'; cx.lineWidth = 1;
            cx.beginPath(); cx.moveTo(padL, padT); cx.lineTo(padL, H - padB); cx.lineTo(W - padR, H - padB); cx.stroke();
            cx.fillStyle = '#64748b'; cx.font = '9px monospace';
            cx.fillText('r', W - padR - 5, H - padB + 8); cx.fillText('x', padL + 2, padT + 8);

            for (let i = 0; i < steps; i++) {
                let ri = rMin + (i / steps) * (rMax - rMin);
                let x2 = 0.5;
                for (let j = 0; j < 300; j++) x2 = ri * x2 * (1 - x2);
                for (let j = 0; j < 100; j++) {
                    x2 = ri * x2 * (1 - x2);
                    let px = padL + i;
                    let py = padT + (1 - x2) * (H - padT - padB);
                    cx.fillStyle = `hsl(${x2 * 360},80%,60%)`;
                    cx.fillRect(px, py, 1, 1);
                }
            }

            // Highlight current r
            let px2 = padL + ((r - rMin) / (rMax - rMin)) * (W - padL - padR);
            cx.strokeStyle = 'rgba(248,113,113,0.7)'; cx.lineWidth = 1.5;
            cx.setLineDash([4, 4]);
            cx.beginPath(); cx.moveTo(px2, padT); cx.lineTo(px2, H - padB); cx.stroke();
            cx.setLineDash([]);
            cx.fillStyle = '#f87171'; cx.fillText(`r=${r.toFixed(3)}`, px2 + 3, padT + 12);
        }

        /* ---- DOUBLE PENDULUM ---- */
        let dpState, dpAnimId;

        function resetDP() {
            cancelAnimationFrame(dpAnimId);
            let L1 = parseFloat(document.getElementById('dpL1').value) || 1;
            let L2 = parseFloat(document.getElementById('dpL2').value) || 1;
            let m1 = parseFloat(document.getElementById('dpM1').value) || 1;
            let m2 = parseFloat(document.getElementById('dpM2').value) || 1;
            let t1 = parseFloat(document.getElementById('dpT1').value) || 90;
            let t2 = parseFloat(document.getElementById('dpT2').value) || 45;
            dpState = { t1: t1 * Math.PI / 180, t2: t2 * Math.PI / 180, w1: 0, w2: 0, L1, L2, m1, m2, g: 9.81, trail: [] };
            runDP();
        }

        function dpStep(s, dt) {
            let { t1, t2, w1, w2, L1, L2, m1, m2, g } = s;
            let d = t1 - t2;
            let sin_d = Math.sin(d), cos_d = Math.cos(d), sin_t1 = Math.sin(t1), sin_t2 = Math.sin(t2);
            let M = m1 + m2;
            let denom1 = L1 * (2 * m1 + m2 - m2 * Math.cos(2 * d));
            let denom2 = L2 * (2 * m1 + m2 - m2 * Math.cos(2 * d));

            let a1 = (-g * ((2 * m1 + m2) * sin_t1) + -m2 * g * Math.sin(t1 - 2 * t2) + -2 * sin_d * m2 * (w2 * w2 * L2 + w1 * w1 * L1 * cos_d)) / denom1;
            let a2 = (2 * sin_d * (w1 * w1 * L1 * M + g * M * Math.cos(t1) + w2 * w2 * L2 * m2 * cos_d)) / denom2;

            return { t1: t1 + w1 * dt, t2: t2 + w2 * dt, w1: w1 + a1 * dt, w2: w2 + a2 * dt, L1, L2, m1, m2, g, trail: s.trail };
        }

        function runDP() {
            const canvas = document.getElementById('dpCanvas');
            canvas.width = canvas.offsetWidth;
            canvas.height = 380;
            const cx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const ox = W / 2, oy = H * 0.35;
            let scale = Math.min(W, H) * 0.3 / (dpState.L1 + dpState.L2);

            function step() {
                for (let i = 0; i < 8; i++) dpState = dpStep(dpState, 0.005);

                let { t1, t2, L1, L2, trail } = dpState;
                let x1 = ox + Math.sin(t1) * L1 * scale;
                let y1 = oy + Math.cos(t1) * L1 * scale;
                let x2 = x1 + Math.sin(t2) * L2 * scale;
                let y2 = y1 + Math.cos(t2) * L2 * scale;

                trail.push({ x2, y2 });
                if (trail.length > 500) trail.shift();

                cx.clearRect(0, 0, W, H);
                cx.fillStyle = '#0f172a'; cx.fillRect(0, 0, W, H);

                // Trail
                if (trail.length > 1) {
                    for (let i = 1; i < trail.length; i++) {
                        let a = i / trail.length;
                        cx.beginPath(); cx.moveTo(trail[i - 1].x2, trail[i - 1].y2); cx.lineTo(trail[i].x2, trail[i].y2);
                        cx.strokeStyle = `hsla(${a * 360},100%,60%,${a})`; cx.lineWidth = 1.5; cx.stroke();
                    }
                }
                // Rods
                cx.strokeStyle = '#94a3b8'; cx.lineWidth = 3;
                cx.beginPath(); cx.moveTo(ox, oy); cx.lineTo(x1, y1); cx.stroke();
                cx.beginPath(); cx.moveTo(x1, y1); cx.lineTo(x2, y2); cx.stroke();
                // Bobs
                cx.beginPath(); cx.arc(x1, y1, 8, 0, Math.PI * 2); cx.fillStyle = '#38bdf8'; cx.fill();
                cx.beginPath(); cx.arc(x2, y2, 6, 0, Math.PI * 2); cx.fillStyle = '#f87171'; cx.fill();
                // Pivot
                cx.beginPath(); cx.arc(ox, oy, 4, 0, Math.PI * 2); cx.fillStyle = '#64748b'; cx.fill();

                dpAnimId = requestAnimationFrame(step);
            }
            step();
        }

        // Init default
        setTimeout(runLorenz, 100);
    </script>
    <script src="ai-chat.js"></script>
</body>

</html>
