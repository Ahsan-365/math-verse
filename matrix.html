<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Operations - Math Verse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <style>
        .matrix-grid {
            display: grid;
            gap: 0.25rem;
            padding: 0.5rem;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(236, 72, 153, 0.3);
            border-radius: 0.5rem;
        }

        .cell-input {
            width: 50px;
            height: 50px;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(236, 72, 153, 0.5);
            color: white;
            outline: none;
            transition: 0.2s;
            font-family: monospace;
        }

        .cell-input:focus {
            border-color: #f472b6;
            box-shadow: 0 0 10px rgba(244, 114, 182, 0.5);
            background: rgba(244, 114, 182, 0.1);
        }

        .cell-output {
            width: 60px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
            font-family: monospace;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>

<body class="flex flex-col items-center p-4 lg:p-8 relative">
    <div class="glass-panel w-full max-w-6xl p-6 lg:p-10 flex flex-col fade-in-up mt-4 md:mt-8 gap-8 relative">
        <h2
            class="text-3xl md:text-5xl font-extrabold text-center text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-rose-500 pb-2">
            <i class="fas fa-th text-pink-400"></i> Matrix Engine
        </h2>

        <div class="flex flex-col xl:flex-row gap-8 w-full justify-center">

            <!-- Matrix A -->
            <div
                class="bg-gray-900/50 p-6 rounded-2xl border border-pink-500/30 shadow-lg flex flex-col items-center gap-4">
                <div class="flex justify-between w-full items-center">
                    <h3 class="text-xl font-bold text-pink-300">Matrix A</h3>
                    <div class="flex gap-2">
                        <select id="sizeA"
                            class="bg-black text-xs text-white p-1 rounded border border-gray-600 outline-none"
                            onchange="buildM('A')">
                            <option value="2">2x2</option>
                            <option value="3" selected>3x3</option>
                            <option value="4">4x4</option>
                        </select>
                    </div>
                </div>
                <div id="gridA" class="matrix-grid"></div>

                <!-- Unary Ops -->
                <div class="grid grid-cols-2 gap-2 w-full mt-2">
                    <button class="btn bg-gray-800 hover:bg-gray-700 text-xs text-pink-200 border border-gray-600"
                        onclick="unaryOp('A', 'det')">Determinant |A|</button>
                    <button class="btn bg-gray-800 hover:bg-gray-700 text-xs text-pink-200 border border-gray-600"
                        onclick="unaryOp('A', 'inv')">Inverse A⁻¹</button>
                    <button class="btn bg-gray-800 hover:bg-gray-700 text-xs text-pink-200 border border-gray-600"
                        onclick="unaryOp('A', 'transpose')">Transpose Aᵀ</button>
                    <button class="btn bg-gray-800 hover:bg-gray-700 text-xs text-pink-200 border border-gray-600"
                        onclick="unaryOp('A', 'trace')">Trace tr(A)</button>
                </div>
            </div>

            <!-- Operations -->
            <div class="flex flex-col xl:justify-center gap-4 items-center">
                <button
                    class="btn bg-pink-600 hover:bg-pink-500 text-white font-bold w-full rounded-full shadow-[0_0_15px_rgba(219,39,119,0.5)]"
                    onclick="binOp('add')">A + B</button>
                <button
                    class="btn bg-pink-600 hover:bg-pink-500 text-white font-bold w-full rounded-full shadow-[0_0_15px_rgba(219,39,119,0.5)]"
                    onclick="binOp('sub')">A - B</button>
                <button
                    class="btn bg-pink-600 hover:bg-pink-500 text-white font-bold w-full rounded-full shadow-[0_0_15px_rgba(219,39,119,0.5)]"
                    onclick="binOp('mul')">A × B</button>
            </div>

            <!-- Matrix B -->
            <div
                class="bg-gray-900/50 p-6 rounded-2xl border border-rose-500/30 shadow-lg flex flex-col items-center gap-4">
                <div class="flex justify-between w-full items-center">
                    <h3 class="text-xl font-bold text-rose-300">Matrix B</h3>
                    <div class="flex gap-2">
                        <select id="sizeB"
                            class="bg-black text-xs text-white p-1 rounded border border-gray-600 outline-none"
                            onchange="buildM('B')">
                            <option value="2">2x2</option>
                            <option value="3" selected>3x3</option>
                            <option value="4">4x4</option>
                        </select>
                    </div>
                </div>
                <div id="gridB" class="matrix-grid !border-rose-500/30"></div>

                <!-- Unary Ops -->
                <div class="grid grid-cols-2 gap-2 w-full mt-2">
                    <button class="btn bg-gray-800 hover:bg-gray-700 text-xs text-rose-200 border border-gray-600"
                        onclick="unaryOp('B', 'det')">Determinant |B|</button>
                    <button class="btn bg-gray-800 hover:bg-gray-700 text-xs text-rose-200 border border-gray-600"
                        onclick="unaryOp('B', 'inv')">Inverse B⁻¹</button>
                    <button class="btn bg-gray-800 hover:bg-gray-700 text-xs text-rose-200 border border-gray-600"
                        onclick="unaryOp('B', 'transpose')">Transpose Bᵀ</button>
                    <button class="btn bg-gray-800 hover:bg-gray-700 text-xs text-rose-200 border border-gray-600"
                        onclick="unaryOp('B', 'trace')">Trace tr(B)</button>
                </div>
            </div>

        </div>

        <!-- Results Area -->
        <div id="resArea"
            class="hidden w-full bg-black/60 rounded-2xl border border-emerald-500/40 shadow-[inset_0_0_20px_rgba(0,0,0,0.8)] p-6 md:p-8 flex flex-col items-center mt-4">
            <h3 class="text-emerald-400 font-bold uppercase tracking-widest text-sm mb-4" id="resTitle">Result</h3>
            <div id="resGrid" class="matrix-grid !border-emerald-500/50"></div>
            <div id="resScalar" class="text-4xl text-emerald-300 font-bold hidden font-mono"></div>
            <div id="resError" class="text-rose-400 font-bold mt-2 hidden"></div>
        </div>

    </div>

    <!-- Need script.js for nav -->
    <script src="script.js"></script>
    <script>
        function buildM(t) {
            let s = parseInt(document.getElementById(`size${t}`).value);
            let g = document.getElementById(`grid${t}`);
            g.style.gridTemplateColumns = `repeat(${s}, 1fr)`;
            g.innerHTML = '';
            for (let r = 0; r < s; r++) {
                for (let c = 0; c < s; c++) {
                    let inp = document.createElement('input');
                    inp.type = 'number';
                    inp.className = 'cell-input';
                    inp.id = `m${t}_${r}_${c}`;
                    inp.value = t === 'A' ? (r === c ? 1 : 0) : (r * s + c + 1); // some default pattern
                    g.appendChild(inp);
                }
            }
        }

        function getM(t) {
            let s = parseInt(document.getElementById(`size${t}`).value);
            let m = [];
            for (let r = 0; r < s; r++) {
                let row = [];
                for (let c = 0; c < s; c++) {
                    let v = parseFloat(document.getElementById(`m${t}_${r}_${c}`).value);
                    row.push(isNaN(v) ? 0 : v);
                }
                m.push(row);
            }
            return m;
        }

        function showResScalar(val, title) {
            document.getElementById('resArea').classList.remove('hidden');
            document.getElementById('resGrid').classList.add('hidden');
            document.getElementById('resError').classList.add('hidden');

            let rs = document.getElementById('resScalar');
            rs.innerText = math.format(val, { precision: 5 });
            rs.classList.remove('hidden');
            document.getElementById('resTitle').innerText = title;
        }

        function showResMatrix(mat, title) {
            document.getElementById('resArea').classList.remove('hidden');
            document.getElementById('resScalar').classList.add('hidden');
            document.getElementById('resError').classList.add('hidden');

            let rg = document.getElementById('resGrid');
            rg.classList.remove('hidden');
            document.getElementById('resTitle').innerText = title;

            let rows = mat.length;
            let cols = mat[0].length;
            rg.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            rg.innerHTML = '';

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let div = document.createElement('div');
                    div.className = 'cell-output bg-black text-emerald-300';
                    let v = mat[r][c];
                    // Clean tiny JS floats
                    if (Math.abs(v) < 1e-10) v = 0;
                    div.innerText = math.format(v, { precision: 4 });
                    div.title = v; // hover full val
                    rg.appendChild(div);
                }
            }
        }

        function showError(msg) {
            document.getElementById('resArea').classList.remove('hidden');
            document.getElementById('resGrid').classList.add('hidden');
            document.getElementById('resScalar').classList.add('hidden');
            let re = document.getElementById('resError');
            re.innerText = msg;
            re.classList.remove('hidden');
        }

        function unaryOp(target, op) {
            let M = getM(target);
            try {
                if (op === 'det') showResScalar(math.det(M), `Determinant of ${target} |${target}|`);
                if (op === 'trace') showResScalar(math.trace(M), `Trace of ${target} tr(${target})`);
                if (op === 'inv') showResMatrix(math.inv(M), `Inverse of ${target} (${target}⁻¹)`);
                if (op === 'transpose') showResMatrix(math.transpose(M), `Transpose of ${target} (${target}ᵀ)`);
            } catch (e) {
                showError(e.message || "Operation failed.");
            }
        }

        function binOp(op) {
            let A = getM('A');
            let B = getM('B');
            let sA = parseInt(document.getElementById(`sizeA`).value);
            let sB = parseInt(document.getElementById(`sizeB`).value);

            try {
                if (op === 'add' || op === 'sub') {
                    if (sA !== sB) throw new Error("Matrices must be the same size for addition/subtraction.");
                    let Res = op === 'add' ? math.add(A, B) : math.subtract(A, B);
                    showResMatrix(Res, `Result of A ${op === 'add' ? '+' : '-'} B`);
                }
                if (op === 'mul') {
                    if (A[0].length !== B.length) throw new Error("Cols of A must match Rows of B.");
                    let Res = math.multiply(A, B);
                    showResMatrix(Res, `Result of A × B`);
                }
            } catch (e) {
                showError(e.message || "Operation failed.");
            }
        }

        // Init
        buildM('A');
        buildM('B');
    </script>
    <script src="ai-chat.js"></script>
</body>

</html>
